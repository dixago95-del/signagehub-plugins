<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock HUD - Local Test Sandbox</title>
  <style>
    /* Full-viewport zero-margin resetting */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050508;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Simulation background video styling */
    #video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Absolute overlay container for the widget mount */
    #hud-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none; /* Let pointer events pass through to other layers */
    }

    /* Control panel wrapper for test triggers */
    #control-panel {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(10, 14, 24, 0.8);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 16px 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 90%;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    }

    /* Controls button design */
    button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.85);
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.25);
      color: #ffffff;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
    }

    /* Mode visual indicator styling */
    .active-btn {
      background: #007aff !important;
      border-color: #007aff !important;
      color: #ffffff !important;
      box-shadow: 0 0 15px rgba(0, 122, 255, 0.45);
    }

    /* Info Badge details style */
    #status-badge {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100;
      background: rgba(10, 12, 18, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #30d158; /* Active green status badge */
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <!-- Fullscreen background video simulating digital signage -->
  <video id="video-bg" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Status indicator for the active lifecycle -->
  <div id="status-badge">LIFECYCLE: ACTIVE</div>

  <!-- Container for the plugin mount -->
  <div id="hud-container"></div>

  <!-- Test Bench Control Panel -->
  <div id="control-panel">
    <button id="btn-digital" class="active-btn">Load Digital Mode (Copenhagen, Tokyo, New York)</button>
    <button id="btn-flip">Load Airport Flip Mode (London, Singapore)</button>
    <button id="btn-analog">Load Analog Mode (Sydney, Los Angeles)</button>
    <button id="btn-suspend" style="color: #ff453a; background: rgba(255, 69, 58, 0.1); border-color: rgba(255, 69, 58, 0.25);">Trigger Suspend</button>
    <button id="btn-resume" style="color: #30d158; background: rgba(48, 209, 88, 0.1); border-color: rgba(48, 209, 88, 0.25);">Trigger Resume</button>
  </div>

  <!-- Module import script to execute tests -->
  <script type="module">
    import * as worldClock from './plugin.js';

    const container = document.getElementById('hud-container');
    const statusBadge = document.getElementById('status-badge');

    // Helper to toggle active classes
    function selectButton(activeButton) {
      document.getElementById('btn-digital').classList.remove('active-btn');
      document.getElementById('btn-flip').classList.remove('active-btn');
      document.getElementById('btn-analog').classList.remove('active-btn');
      if (activeButton) {
        activeButton.classList.add('active-btn');
      }
    }

    // Step 1: Initialize HUD config
    await worldClock.init({
      timezones: [
        { label: 'Copenhagen', zone: 'Europe/Copenhagen' },
        { label: 'Tokyo', zone: 'Asia/Tokyo' },
        { label: 'New York', zone: 'America/New_York' }
      ],
      displayType: 'digital'
    });

    // Step 2: Mount to overlay wrapper
    worldClock.mount(container);

    // Controls setup: Mode updates
    document.getElementById('btn-digital').addEventListener('click', async (e) => {
      selectButton(e.target);
      await worldClock.update({
        timezones: [
          { label: 'Copenhagen', zone: 'Europe/Copenhagen' },
          { label: 'Tokyo', zone: 'Asia/Tokyo' },
          { label: 'New York', zone: 'America/New_York' }
        ],
        displayType: 'digital'
      });
    });

    document.getElementById('btn-flip').addEventListener('click', async (e) => {
      selectButton(e.target);
      await worldClock.update({
        timezones: [
          { label: 'London', zone: 'Europe/London' },
          { label: 'Singapore', zone: 'Asia/Singapore' }
        ],
        displayType: 'flip'
      });
    });

    document.getElementById('btn-analog').addEventListener('click', async (e) => {
      selectButton(e.target);
      await worldClock.update({
        timezones: [
          { label: 'Sydney', zone: 'Australia/Sydney' },
          { label: 'Los Angeles', zone: 'America/Los_Angeles' }
        ],
        displayType: 'analog'
      });
    });

    // Controls setup: Lifecycle triggers
    document.getElementById('btn-suspend').addEventListener('click', () => {
      worldClock.suspend();
      statusBadge.textContent = 'LIFECYCLE: SUSPENDED';
      statusBadge.style.color = '#ff453a';
    });

    document.getElementById('btn-resume').addEventListener('click', () => {
      worldClock.resume();
      statusBadge.textContent = 'LIFECYCLE: ACTIVE';
      statusBadge.style.color = '#30d158';
    });
  </script>
</body>
</html>
