<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather HUD - Cinematic 9-Sector Sandbox</title>
  <style>
    /* Full-viewport zero-margin resetting */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050508;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* Simulation background video styling */
    #video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Absolute overlay container for the widget mount (guaranteed size mapping) */
    #hud-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-width: 100vw;
      min-height: 100vh;
      z-index: 100;
      pointer-events: none; /* Let pointer events pass through to other layers */
      box-sizing: border-box;
    }

    /* Control panel wrapper for test triggers (Fixed Admin Supremacy Layering) */
    #control-panel {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25000 !important;
      background: rgba(10, 14, 24, 0.85);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      width: 720px;
      max-width: 95%;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #control-panel.hidden-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(250px);
    }

    .control-row {
      display: flex;
      gap: 16px;
      width: 100%;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.5);
    }

    select, input[type="range"] {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      box-sizing: border-box;
    }

    select option {
      background: #0f1015;
      color: #fff;
    }

    /* Controls button design */
    button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.85);
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.25);
      color: #ffffff;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
    }

    /* Info Badge details style */
    #status-badge {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100;
      background: rgba(10, 12, 18, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #30d158; /* Active green status badge */
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Floating toggle button (Absolute Admin Supremacy Layering) */
    #btn-toggle-controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 30000 !important;
      background: rgba(10, 14, 24, 0.85);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      color: #ffffff;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #btn-toggle-controls:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    #btn-toggle-controls:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <!-- Fullscreen background video simulating digital signage -->
  <video id="video-bg" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Status indicator for the active lifecycle -->
  <div id="status-badge">LIFECYCLE: ACTIVE</div>

  <!-- Container for the plugin mount -->
  <div id="hud-container"></div>

  <!-- Test Bench Control Panel -->
  <div id="control-panel" style="z-index: 25000 !important; position: fixed;">
    <!-- Row 1: Ultimate Mode Dropdown (4 Premium Custom Experiences) -->
    <div class="control-row">
      <div class="control-group" style="flex-direction: row; align-items: center; gap: 12px;">
        <label for="display-mode" style="font-size: 13px; font-weight: 800; color: rgba(255,255,255,0.75);">DESIGN MODE:</label>
        <select id="display-mode" style="width: 340px; font-size: 14px; padding: 8px 12px; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25);">
          <option value="standard">1. Standard Dark Glass Mode</option>
          <option value="aviation">2. Aviation ICAO/METAR Mode</option>
          <option value="ambient">3. Ambient Climate Glow Mode</option>
          <option value="alert">4. Severe Weather Alert Mode</option>
          <option value="boardroom">5. Executive Boardroom Mode</option>
          <option value="hotel">6. Luxury Hotel Mode</option>
          <option value="metro">7. Metro Transit Mode</option>
          <option value="crt">8. Retro CRT Mode</option>
          <option value="observatory">9. Observatory Mode</option>
          <option value="maritime">10. Maritime Chronometer Mode</option>
          <option value="noir">11. Noir Cinema Mode</option>
          <option value="zen">12. Minimal Zen Mode</option>
          <option value="aicore">13. AI Core Mode</option>
        </select>
      </div>
    </div>

    <!-- Row 2: City Count, Sector, Opacity & Scale Upgrades -->
    <div class="control-row" style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px;">
      <!-- City Count Selector -->
      <div class="control-group">
        <label for="select-city-count">Antal Byer</label>
        <select id="select-city-count">
          <option value="1">1 by</option>
          <option value="2">2 byer</option>
          <option value="3" selected>3 byer</option>
          <option value="4">4 byer</option>
          <option value="5">5 byer</option>
          <option value="6">6 byer</option>
        </select>
      </div>

      <!-- Sector Position Dropdown -->
      <div class="control-group">
        <label for="select-sector">Screen Grid Sector</label>
        <select id="select-sector">
          <option value="1">Sector 1 (Top-Left)</option>
          <option value="2">Sector 2 (Top-Center)</option>
          <option value="3">Sector 3 (Top-Right)</option>
          <option value="4">Sector 4 (Middle-Left)</option>
          <option value="5" selected>Sector 5 (Center)</option>
          <option value="6">Sector 6 (Middle-Right)</option>
          <option value="7">Sector 7 (Bottom-Left)</option>
          <option value="8">Sector 8 (Bottom-Center)</option>
          <option value="9">Sector 9 (Bottom-Right)</option>
        </select>
      </div>

      <!-- Glass Opacity Range Slider (0.0 to 1.0) -->
      <div class="control-group">
        <label for="slider-opacity">Glass Opacity: <span id="lbl-opacity">80%</span></label>
        <input type="range" id="slider-opacity" min="0.0" max="1.0" step="0.05" value="0.8" style="width: 100px;">
      </div>

      <!-- Scale Range Slider (50% to 150%) -->
      <div class="control-group">
        <label for="slider-scale">HUD størrelse (Scale): <span id="lbl-scale">100%</span></label>
        <input type="range" id="slider-scale" min="0.5" max="1.5" step="0.05" value="1.0" style="width: 100px;">
      </div>

      <!-- Lifecycle Triggers -->
      <div class="control-group" style="flex-direction: row; gap: 8px; align-self: flex-end;">
        <button id="btn-suspend" style="color: #ff453a; background: rgba(255, 69, 58, 0.1); border-color: rgba(255, 69, 58, 0.25); padding: 10px 14px;">Suspend</button>
        <button id="btn-resume" style="color: #30d158; background: rgba(48, 209, 88, 0.1); border-color: rgba(48, 209, 88, 0.25); padding: 10px 14px;">Resume</button>
      </div>
    </div>

    <!-- Row 3: Dynamic City Selectors -->
    <div id="city-selectors-container" class="control-row" style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; gap: 12px; width: 100%; justify-content: center;">
      <!-- Dynamic dropdown fields will be injected here -->
    </div>
  </div>

  <!-- Floating Toggle Button for Control Panel (Absolute Admin Supremacy) -->
  <button id="btn-toggle-controls" style="z-index: 30000 !important; position: fixed;">
    <svg id="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.3s ease;">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
      <circle cx="12" cy="12" r="3"></circle>
    </svg>
    <span id="toggle-text">Skjul kontrolpanel</span>
  </button>

  <!-- Load standard script tag strictly relative without defer/async to avoid CORS / loading out of order -->
  <script src="plugin.js"></script>

  <!-- Test bench interaction script -->
  <script>
    const statusBadge = document.getElementById('status-badge');
    const curatedCities = [
      { name: 'Copenhagen', lat: 55.6761, lon: 12.5683, label: 'CPH - Copenhagen' },
      { name: 'London', lat: 51.5074, lon: -0.1278, label: 'LON - London' },
      { name: 'New York', lat: 40.7128, lon: -74.0060, label: 'NYC - New York' },
      { name: 'Tokyo', lat: 35.6895, lon: 139.6917, label: 'TYO - Tokyo' },
      { name: 'Dubai', lat: 25.2048, lon: 55.2708, label: 'DXB - Dubai' },
      { name: 'Singapore', lat: 1.3521, lon: 103.8198, label: 'SIN - Singapore' },
      { name: 'Sydney', lat: -33.8688, lon: 151.2093, label: 'SYD - Sydney' },
      { name: 'Los Angeles', lat: 34.0522, lon: -118.2437, label: 'LAX - Los Angeles' },
      { name: 'Paris', lat: 48.8566, lon: 2.3522, label: 'PAR - Paris' },
      { name: 'Berlin', lat: 52.5200, lon: 13.4050, label: 'BER - Berlin' }
    ];

    // Dynamic city selector injection
    function renderCitySelectors(count) {
      const container = document.getElementById('city-selectors-container');
      
      // Preserve existing select values if possible
      const currentSelects = container.querySelectorAll('.city-slot-select');
      const previousValues = Array.from(currentSelects).map(sel => sel.value);

      container.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        group.style.cssText = "display: flex; flex-direction: column; gap: 6px;";

        const label = document.createElement('label');
        label.innerText = `Slot ${i + 1}`;

        const select = document.createElement('select');
        select.id = `select-slot-${i + 1}`;
        select.className = 'city-slot-select';
        select.style.cssText = "background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: #fff; padding: 10px; font-size: 13px; font-weight: 600; outline: none; box-sizing: border-box; width: 150px;";

        curatedCities.forEach(city => {
          const opt = document.createElement('option');
          opt.value = city.name;
          opt.innerText = city.label;
          select.appendChild(opt);
        });

        // Pre-select logic
        if (previousValues[i] && curatedCities.some(c => c.name === previousValues[i])) {
          select.value = previousValues[i];
        } else {
          select.value = curatedCities[i % curatedCities.length].name;
        }

        select.addEventListener('change', updateHUDSettings);

        group.appendChild(label);
        group.appendChild(select);
        container.appendChild(group);
      }

      updateHUDSettings();
    }

    function updateHUDSettings() {
      const selects = document.querySelectorAll('.city-slot-select');
      const selectedCityNames = Array.from(selects).map(sel => sel.value);
      
      // Map names back to full city objects (name, lat, lon)
      const selectedCities = selectedCityNames.map(name => {
        return curatedCities.find(c => c.name === name);
      }).filter(Boolean);

      const currentSector = Number(document.getElementById('select-sector').value);
      const currentOpacity = parseFloat(document.getElementById('slider-opacity').value);
      const currentScale = parseFloat(document.getElementById('slider-scale').value);
      const displayType = document.getElementById('display-mode').value;

      window.WeatherHUD.update({
        cities: selectedCities,
        displayType: displayType,
        sector: currentSector,
        glassOpacity: currentOpacity,
        scale: currentScale
      });
    }

    // DOMContentLoaded Timing Protection Wrapper
    window.addEventListener('DOMContentLoaded', () => {
      try {
        if (typeof window.WeatherHUD === 'undefined') {
          throw new Error("window.WeatherHUD is undefined. The script may have failed to load or parse.");
        }
        
        window.WeatherHUD.init({ 
          container: '#hud-container', 
          settings: { 
            displayType: 'standard', 
            cities: [
              { name: 'Copenhagen', lat: 55.6761, lon: 12.5683 },
              { name: 'Tokyo', lat: 35.6895, lon: 139.6917 },
              { name: 'New York', lat: 40.7128, lon: -74.0060 }
            ], 
            sector: 5, 
            glassOpacity: 0.8, 
            scale: 1.0 
          } 
        });
        window.WeatherHUD.mount();

        // Initialize controls state
        const countDropdown = document.getElementById('select-city-count');
        countDropdown.value = "3";

        const themeDropdown = document.getElementById('display-mode');
        themeDropdown.value = "standard";

        renderCitySelectors(3);

      } catch (err) {
        console.error("HUD Catch-All Error:", err);
        const errDiv = document.createElement('div');
        errDiv.style.cssText = "position:absolute; top:20px; left:20px; background:red; color:white; z-index:99999; padding:20px; font-family:monospace;";
        errDiv.innerText = "HUD Crash: " + err.message;
        document.body.appendChild(errDiv);
      }
    });

    // Theme selector change listener
    document.getElementById('display-mode').addEventListener('change', () => {
      updateHUDSettings();
    });

    // City count listener
    document.getElementById('select-city-count').addEventListener('change', (e) => {
      const count = Number(e.target.value);
      if (count >= 1 && count <= 9) {
        renderCitySelectors(count);
      }
    });

    // Grid Sector selector change listener
    document.getElementById('select-sector').addEventListener('change', () => {
      updateHUDSettings();
    });

    // Glass Opacity slider change listener
    const opacitySlider = document.getElementById('slider-opacity');
    const opacityLabel = document.getElementById('lbl-opacity');
    
    opacitySlider.addEventListener('input', (e) => {
      const currentOpacity = parseFloat(e.target.value);
      opacityLabel.textContent = `${Math.round(currentOpacity * 100)}%`;
      updateHUDSettings();
    });

    // Scale slider change listener
    const scaleSlider = document.getElementById('slider-scale');
    const scaleLabel = document.getElementById('lbl-scale');

    scaleSlider.addEventListener('input', (e) => {
      const currentScale = parseFloat(e.target.value);
      scaleLabel.textContent = `${Math.round(currentScale * 100)}%`;
      updateHUDSettings();
    });

    // Lifecycle triggers
    document.getElementById('btn-suspend').addEventListener('click', () => {
      window.WeatherHUD.unmount();
      statusBadge.textContent = 'LIFECYCLE: SUSPENDED';
      statusBadge.style.color = '#ff453a';
    });

    document.getElementById('btn-resume').addEventListener('click', () => {
      window.WeatherHUD.mount();
      updateHUDSettings();
      statusBadge.textContent = 'LIFECYCLE: ACTIVE';
      statusBadge.style.color = '#30d158';
    });

    // Show/Hide Panel toggler (Absolute Admin Supremacy)
    const toggleBtn = document.getElementById('btn-toggle-controls');
    const controlPanel = document.getElementById('control-panel');
    const toggleIcon = document.getElementById('toggle-icon');
    const toggleText = document.getElementById('toggle-text');

    toggleBtn.addEventListener('click', () => {
      const isHidden = controlPanel.classList.toggle('hidden-panel');
      if (isHidden) {
        toggleText.textContent = 'Vis/Skjul Menu';
        toggleIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        toggleText.textContent = 'Skjul kontrolpanel';
        toggleIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    });
  </script>
</body>
</html>
