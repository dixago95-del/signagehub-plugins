<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignageHub Master Platform</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Global Reset & Base Styling */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030305;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      user-select: none;
    }

    /* Fixed Cinematic Underlay Backdrop */
    #cinema-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
    }

    /* Cinematic Overlay shading to enhance visibility */
    #cinema-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Canva Background Container & Crop styling */
    #canva-background-container {
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      display: none;
    }
    #canva-background-container iframe {
      width: 100%;
      height: calc(100% + 50px);
      transform: scale(1.05);
      transform-origin: top center;
      border: none;
      pointer-events: none;
    }

    /* Screen Simulator Portrait Overrides */
    body.portrait-mode #cinema-backdrop,
    body.portrait-mode #cinema-overlay,
    body.portrait-mode #layout-matrix,
    body.portrait-mode #canva-background-container {
      width: calc(100vh * 9 / 16) !important;
      height: 100vh !important;
      left: 50% !important;
      right: auto !important;
      transform: translateX(-50%) !important;
    }

    /* Global 3x3 Layout Grid Matrix Layer */
    #layout-matrix {
      position: fixed;
      top: 0;
      left: 0;
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      grid-template-rows: repeat(3, minmax(0, 1fr)) !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-sizing: border-box;
      z-index: 10000;
      pointer-events: none; /* Ignore pointer events on grid itself */
    }

    /* Grid Slot Styling & Transform Origins for Edge Alignment */
    .matrix-slot {
      pointer-events: auto; /* Re-enable pointer events inside slots for interactive elements */
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 100% !important;
      height: 100% !important;
      position: relative !important; /* CRITICAL ANCHOR */
      overflow: visible !important;
    }

    /* Explicit Row/Column Matrix coordinates and alignments */
    .slot-1 {
      grid-row: 1;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top left;
    }
    .slot-2 {
      grid-row: 1;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top center;
    }
    .slot-3 {
      grid-row: 1;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top right;
    }
    .slot-4 {
      grid-row: 2;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center left;
    }
    .slot-5 {
      grid-row: 2;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center center;
    }
    .slot-6 {
      grid-row: 2;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center right;
    }
    .slot-7 {
      grid-row: 3;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom left;
    }
    .slot-8 {
      grid-row: 3;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom center;
    }
    .slot-9 {
      grid-row: 3;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom right;
    }

    /* 9-Slot Administrative Control Dashboard (Glassmorphic) */
    #master-control-panel {
      position: fixed;
      right: 24px;
      top: 24px;
      bottom: 24px;
      width: 380px;
      height: calc(100vh - 48px);
      z-index: 30000 !important;
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      background: rgba(10, 14, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Hidden Drawer State */
    #master-control-panel.drawer-hidden {
      transform: translateX(430px);
      opacity: 0;
    }

    /* Dashboard Header */
    .panel-header-block {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.05em;
      margin: 0;
      background: linear-gradient(135deg, #00f0ff 0%, #7000ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .panel-subtitle {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Scrollable Slot Configuration Grid */
    .panel-body-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Custom Scrollbar */
    .panel-body-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .panel-body-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Accordion Control Blocks - Totally Unclipped */
    .slot-config-block {
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      overflow: visible; /* Ensure nothing is hidden or clipped */
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .slot-config-block.active-slot {
      border-color: rgba(0, 240, 255, 0.25);
      background: rgba(0, 240, 255, 0.02);
    }

    .slot-accordion-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.7);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      transition: background 0.2s ease;
    }

    .slot-accordion-header:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
    }

    .slot-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.3s ease;
    }

    .active-slot .slot-status-dot {
      background: #00f0ff;
      box-shadow: 0 0 10px #00f0ff;
    }

    .slot-accordion-body {
      padding: 0 20px 20px 20px;
      display: none; /* Accordion state */
      flex-direction: column;
      gap: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 16px;
      overflow: visible; /* Ensure inner elements are unclipped */
    }

    .slot-config-block.open-block .slot-accordion-body {
      display: flex;
    }

    /* Control Inputs */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }
    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    select option {
      background: #0e111a;
      color: #ffffff;
    }

    /* Range Sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .slider-value {
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      color: rgba(255, 255, 255, 0.6);
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      flex: 1;
      width: 100%;
      padding: 0;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      box-sizing: border-box;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00f0ff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
      transition: background 0.15s, transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #ffffff;
      transform: scale(1.2);
    }

    /* Sub Settings Container Specific */
    .sub-settings-panel {
      border: 1px dashed rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.01);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    /* Ultimate Visibility Control Toggler */
    #btn-toggle-controls {
      position: fixed;
      bottom: 30px;
      right: 428px; /* Offset next to the panel */
      z-index: 40000 !important;
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      background: rgba(10, 14, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      color: #ffffff;
      padding: 14px 22px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #btn-toggle-controls.controls-closed {
      right: 30px;
    }

    #btn-toggle-controls:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    #btn-toggle-controls:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <!-- Fixed Luxury Backdrop Cinematic Video Loop -->
  <video id="cinema-backdrop" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Cinematic Shade Layer -->
  <div id="cinema-overlay"></div>

  <!-- Canva Background Container -->
  <div id="canva-background-container"></div>

  <!-- The Global 3x3 Coordinate Matrix Grid -->
  <div id="layout-matrix">
    <div class="matrix-slot slot-1" id="grid-slot-1"></div>
    <div class="matrix-slot slot-2" id="grid-slot-2"></div>
    <div class="matrix-slot slot-3" id="grid-slot-3"></div>
    <div class="matrix-slot slot-4" id="grid-slot-4"></div>
    <div class="matrix-slot slot-5" id="grid-slot-5"></div>
    <div class="matrix-slot slot-6" id="grid-slot-6"></div>
    <div class="matrix-slot slot-7" id="grid-slot-7"></div>
    <div class="matrix-slot slot-8" id="grid-slot-8"></div>
    <div class="matrix-slot slot-9" id="grid-slot-9"></div>
  </div>

  <!-- Visibility Control Button -->
  <button id="btn-toggle-controls">
    <span class="eye-icon">👁️</span>
    <span class="btn-text">SHOW/HIDE MASTER PANEL</span>
  </button>

  <!-- Master Administrative Panel -->
  <div id="master-control-panel">
    <div class="panel-header-block">
      <h1 class="panel-title">SignageHub Manager</h1>
      <div class="panel-subtitle">Modular Layout Engine</div>

      <!-- Row 1: Screen Orientation & Environment Preset -->
      <div style="display: flex; gap: 12px; margin-top: 12px;">
        <div class="control-group" style="flex: 1;">
          <label class="control-label">SCREEN ORIENTATION</label>
          <select id="orientation-selector" onchange="toggleOrientation(this.value)">
            <option value="landscape">↔️ Landscape (16:9)</option>
            <option value="portrait">↕️ Portrait (9:16)</option>
          </select>
        </div>
        <div class="control-group" style="flex: 1;">
          <label class="control-label">ENVIRONMENT PRESET</label>
          <select id="preset-selector" onchange="applyPreset(this.value)">
            <option value="blank">Blank Canvas (Default)</option>
            <option value="executive">💼 Executive Global</option>
            <option value="hotel">🏨 Luxury Hotel</option>
            <option value="scandinavian">🇩🇰 Minimal Scandinavian</option>
            <option value="restaurant">🍴 Restaurant Preset</option>
          </select>
        </div>
      </div>
      
      <!-- Row 2: Select Backdrop Environment -->
      <div class="control-group" style="margin-top: 12px;">
        <label class="control-label">Select Backdrop Environment</label>
        <select id="video-selector">
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4">Luxury Hotel Lounge</option>
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4">Fine Dining Restaurant</option>
          <option value="canva">🎨 Custom Canva Layout Board</option>
        </select>
      </div>

      <!-- Row 3: Canva Settings Group (Initially Hidden, Inline compact placement) -->
      <div id="canva-settings-group" style="display: none; margin-top: 12px;">
        <div style="display: flex; gap: 10px; align-items: flex-end;">
          <div class="control-group" style="flex: 1;">
            <label class="control-label">Canva Smart Embed Link</label>
            <input type="text" id="canva-embed-link" placeholder="Paste link here" oninput="updateCanvaEmbed(this.value)" style="width: 100%; box-sizing: border-box;">
          </div>
          <a id="canva-edit-btn" href="https://canva.link/qtdk4f6jz096vtm" target="_blank" class="admin-btn" style="height: 34px; line-height: 16px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 11px; background: rgba(0, 240, 255, 0.15); border: 1px solid rgba(0, 240, 255, 0.3); color: #00f0ff; box-sizing: border-box; white-space: nowrap;">
            🎨 Edit
          </a>
        </div>
      </div>
    </div>
    
    <div class="panel-body-scroll" id="slots-controls-container">
      <!-- 9 Slot Controllers will be injected dynamically -->
    </div>
  </div>

  <!-- Load Dumb Scoped Plugins -->
  <script src="apps/world-clock-hud/plugin.js"></script>
  <script src="apps/weather-hud/plugin.js"></script>
  <script src="apps/news-hud/plugin.js"></script>

  <!-- Application Initialization Script -->
  <script>
    const clockThemes = [
      { value: 'digital', label: '🕒 Digital Standard' },
      { value: 'analog', label: '🕒 Analog Sweep' },
      { value: 'flip', label: '🕒 Airport Flip' },
      { value: 'boardroom', label: '🕒 Executive Boardroom' },
      { value: 'hotel', label: '🕒 Luxury Hotel' },
      { value: 'trading', label: '🕒 Trading Floor' },
      { value: 'mission', label: '🕒 Mission Control' },
      { value: 'maritime', label: '🕒 Maritime Chronometer' },
      { value: 'metro', label: '🕒 Metro Transit' },
      { value: 'noir', label: '🕒 Noir Cinema' },
      { value: 'crt', label: '🕒 Retro CRT' },
      { value: 'observatory', label: '🕒 Observatory' },
      { value: 'zen', label: '🕒 Minimal Zen' }
    ];

    const weatherThemes = [
      { value: 'standard', label: '☀️ Standard Dark Glass' },
      { value: 'aviation', label: '☀️ Aviation METAR' },
      { value: 'ambient', label: '☀️ Ambient Climate' },
      { value: 'alert', label: '☀️ Weather Alert' },
      { value: 'boardroom', label: '☀️ Executive Boardroom' },
      { value: 'hotel', label: '☀️ Luxury Hotel' },
      { value: 'metro', label: '☀️ Metro Transit' },
      { value: 'crt', label: '☀️ Retro CRT' },
      { value: 'observatory', label: '☀️ Observatory' },
      { value: 'maritime', label: '☀️ Maritime Chronometer' },
      { value: 'noir', label: '☀️ Noir Cinema' },
      { value: 'zen', label: '☀️ Minimal Zen' },
      { value: 'aicore', label: '☀️ AI Core Mode' }
    ];

    // Human-Readable Spatial Display Zone Names
    const slotNames = {
      1: "Top Left",
      2: "Top Center",
      3: "Top Right",
      4: "Middle Left",
      5: "Middle Center",
      6: "Middle Right",
      7: "Bottom Left",
      8: "Bottom Center",
      9: "Bottom Right"
    };

    // State object for configurations in the dashboard
    const slotConfigurations = {};

    // Initialize default properties for all 9 slots
    for (let i = 1; i <= 9; i++) {
      slotConfigurations[i] = {
        plugin: 'none', // none, clock, weather
        theme: '',
        opacity: 0.8,
        scale: 1.0,
        customTitle: undefined,
        newsMode: 'ticker',
        streams: ['global', 'europe', 'finance']
      };
    }

    // Initial slot state is completely empty canvas
    document.addEventListener('DOMContentLoaded', () => {
      buildAdminControls();
      setupDrawerToggler();
      setupVideoSelector();
      initializeDefaults();
    });

    // Mount initial defaults
    function initializeDefaults() {
      for (let i = 1; i <= 9; i++) {
        const config = slotConfigurations[i];
        if (config.plugin !== 'none') {
          handlePluginChange(i, true);
          syncSlotPlugin(i);
        }
      }
    }

    // Build the 9 collapsible accordion control items dynamically
    function buildAdminControls() {
      const container = document.getElementById('slots-controls-container');
      container.innerHTML = '';

      for (let i = 1; i <= 9; i++) {
        const config = slotConfigurations[i];
        const block = document.createElement('div');
        block.className = `slot-config-block slot-block-${i}`;
        if (config.plugin !== 'none') block.classList.add('active-slot');
        // Let slot 2 and 8 be open by default
        if (i === 2 || i === 8) block.classList.add('open-block');

        block.innerHTML = `
          <div class="slot-accordion-header" onclick="toggleAccordion(${i})">
            <span>${slotNames[i].toUpperCase()} ZONE</span>
            <div class="slot-status-dot"></div>
          </div>
          <div class="slot-accordion-body">
            <!-- Plugin Selector -->
            <div class="control-group">
              <label class="control-label">Active Module</label>
              <select id="plugin-select-${i}" onchange="handlePluginChange(${i})">
                <option value="none" ${config.plugin === 'none' ? 'selected' : ''}>[ None / Empty ]</option>
                <option value="clock" ${config.plugin === 'clock' ? 'selected' : ''}>🕒 World Clock HUD</option>
                <option value="weather" ${config.plugin === 'weather' ? 'selected' : ''}>☀️ Weather HUD</option>
                <option value="news" ${config.plugin === 'news' ? 'selected' : ''}>📰 News HUD</option>
              </select>
            </div>

            <!-- Dynamic Settings Injection Container -->
            <div id="sub-settings-container-${i}"></div>

            <!-- Dynamic Theme Selector -->
            <div class="control-group" id="theme-group-${i}" style="display: ${config.plugin === 'none' ? 'none' : 'flex'}">
              <label class="control-label">Design Theme</label>
              <select id="theme-select-${i}" onchange="handleThemeChange(${i})">
                <!-- Injected via javascript -->
              </select>
            </div>

            <!-- Opacity Range Slider -->
            <div class="control-group" id="opacity-group-${i}" style="display: ${config.plugin === 'none' ? 'none' : 'flex'}">
              <label class="control-label">Glass Opacity</label>
              <div class="slider-row">
                <input type="range" id="opacity-slider-${i}" min="0" max="1" step="0.05" value="${config.opacity}" oninput="handleOpacityChange(${i}, this.value)">
                <span class="slider-value" id="opacity-val-${i}">${Math.round(config.opacity * 100)}%</span>
              </div>
            </div>

            <!-- Scale Range Slider -->
            <div class="control-group" id="scale-group-${i}" style="display: ${config.plugin === 'none' ? 'none' : 'flex'}">
              <label class="control-label">Widget Scale</label>
              <div class="slider-row">

    // Handle Plugin Dropdown Changes
    window.handlePluginChange = function(slotId, isInitialLoad = false) {
      const select = document.getElementById(`plugin-select-${slotId}`);
      const type = select.value;
      const config = slotConfigurations[slotId];
      const block = document.querySelector(`.slot-block-${slotId}`);
      const subContainer = document.getElementById(`sub-settings-container-${slotId}`);
      
      if (!isInitialLoad) {
        // Clean up previous mounts strictly targeting target grid class
        window.WorldClockHUD.unmount(`.slot-${slotId}`);
        window.WeatherHUD.unmount(`.slot-${slotId}`);
        if (window.NewsHUD) {
          window.NewsHUD.unmount(`.slot-${slotId}`);
        }
        window.WorldClockHUD.destroy(`.slot-${slotId}`);
        window.WeatherHUD.destroy(`.slot-${slotId}`);
        if (window.NewsHUD) {
          window.NewsHUD.destroy(`.slot-${slotId}`);
        }
        
        const targetGridElement = document.querySelector(`.slot-${slotId}`);
        if (targetGridElement) {
          targetGridElement.innerHTML = '';
        }
      }

      config.plugin = type;

      if (type === 'none') {
        block.classList.remove('active-slot');
        subContainer.innerHTML = '';
        document.getElementById(`theme-group-${slotId}`).style.display = 'none';
        document.getElementById(`opacity-group-${slotId}`).style.display = 'none';
        document.getElementById(`scale-group-${slotId}`).style.display = 'none';
      } else {
        block.classList.add('active-slot');
        if (type === 'news') {
          document.getElementById(`theme-group-${slotId}`).style.display = 'none';
        } else {
          document.getElementById(`theme-group-${slotId}`).style.display = 'flex';
        }
        document.getElementById(`opacity-group-${slotId}`).style.display = 'flex';
        document.getElementById(`scale-group-${slotId}`).style.display = 'flex';
        
        // Dynamically inject sub-controls
        injectSubControls(slotId, type);
        
        if (type !== 'news') {
          // Set default theme for plugin
          if (!config.theme) {
            config.theme = type === 'clock' ? 'digital' : 'standard';
          }
          populateThemes(slotId, type, config.theme);
        }
        
        if (!isInitialLoad) {
          syncSlotPlugin(slotId);
        }
      }
    };

    // Build the Clock cities sub dropdown items
    window.handleClockCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`clock-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const citiesContainer = document.getElementById(`clock-cities-container-${slotId}`);
      if (!citiesContainer) return;

      citiesContainer.innerHTML = '';

      const availableCapitals = Object.keys(window.WorldClockHUD._capitalTimezones);
      // Premium selection fallbacks to prevent identical starting selections
      const defaultCapitals = ['Copenhagen', 'Tokyo', 'New York', 'London', 'Singapore', 'Sydney', 'Los Angeles', 'Dubai', 'Paris', 'Berlin'];

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        group.innerHTML = `
          <label class="control-label">Clock ${c}</label>
          <select id="clock-city-${slotId}-${c}" onchange="updateSlotInstance(${slotId})">
            ${availableCapitals.map(cap => `<option value="${cap}" ${cap === defaultCapitals[(c - 1) % defaultCapitals.length] ? 'selected' : ''}>${cap}</option>`).join('')}
          </select>
        `;
        citiesContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    // Build the Weather regional optgroups sub dropdown items
    window.handleWeatherCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`weather-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const citiesContainer = document.getElementById(`weather-cities-container-${slotId}`);
      if (!citiesContainer) return;

      citiesContainer.innerHTML = '';

      // Build optgroup HTML dynamically based on regions
      const regionsMap = {};
      window.WeatherHUD.cityDatabase.forEach(city => {
        if (!regionsMap[city.region]) regionsMap[city.region] = [];
        regionsMap[city.region].push(city.name);
      });

      let optGroupsHtml = `<option value="LOCAL">📍 Current Location (LOCAL)</option>`;
      for (const region in regionsMap) {
        optGroupsHtml += `<optgroup label="${region}">`;
        regionsMap[region].forEach(cityName => {
          optGroupsHtml += `<option value="${cityName}">${cityName}</option>`;
        });
        optGroupsHtml += `</optgroup>`;
      }

      // Default city selector mappings to prevent overlaps
      const defaultCities = ['LOCAL', 'Copenhagen', 'New York', 'Tokyo', 'London', 'Paris', 'Sydney', 'Cairo', 'Singapore'];

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        
        // Match default selections if possible
        const defaultChoice = defaultCities[(c - 1) % defaultCities.length];
        
        let tempHtml = optGroupsHtml;
        if (defaultChoice !== 'LOCAL') {
          // Add selected trigger to option tag
          tempHtml = tempHtml.replace(`value="${defaultChoice}"`, `value="${defaultChoice}" selected`);
        } else {
          tempHtml = tempHtml.replace(`value="LOCAL"`, `value="LOCAL" selected`);
        }

        group.innerHTML = `
          <label class="control-label">City ${c}</label>
          <select id="weather-city-${slotId}-${c}" onchange="updateSlotInstance(${slotId})">
            ${tempHtml}
          </select>
        `;
        citiesContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    // Handle News Count Dropdown changes
    window.handleNewsCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`news-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const streamsContainer = document.getElementById(`news-streams-container-${slotId}`);
      if (!streamsContainer) return;

      streamsContainer.innerHTML = '';

      const availableStreams = [
        { value: 'global', label: '🌍 Global' },
        { value: 'europe', label: '🇪🇺 Europe' },
        { value: 'usa', label: '🇺🇸 USA' },
        { value: 'asia', label: '🌏 Asia' },
        { value: 'nordic', label: '🇩🇰 Denmark & Nordics' },
        { value: 'finance', label: '💼 Finance & Markets' },
        { value: 'tech', label: '💻 Technology & AI' }
      ];

      const config = slotConfigurations[slotId];
      if (!config.streams) {
        config.streams = ['global', 'europe', 'finance'];
      }

      while (config.streams.length < count) {
        const nextDefault = availableStreams[config.streams.length % availableStreams.length].value;
        config.streams.push(nextDefault);
      }
      if (config.streams.length > count) {
        config.streams = config.streams.slice(0, count);
      }

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        group.innerHTML = `
          <label class="control-label">News Stream ${c}</label>
          <select id="news-stream-${slotId}-${c}" onchange="handleNewsStreamChange(${slotId}, ${c - 1})">
            ${availableStreams.map(st => `<option value="${st.value}" ${st.value === config.streams[c - 1] ? 'selected' : ''}>${st.label}</option>`).join('')}
          </select>
        `;
        streamsContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    window.handleNewsStreamChange = function(slotId, index) {
      const select = document.getElementById(`news-stream-${slotId}-${index + 1}`);
      if (select) {
        slotConfigurations[slotId].streams[index] = select.value;
        updateSlotInstance(slotId);

    window.handleThemeChange = function(slotId) {

      valueSpan.textContent = `${Math.round(val * 100)}%`;
      slotConfigurations[slotId].opacity = parseFloat(val);

    // Handle Scale Slider Dragging
    window.handleScaleChange = function(slotId, val) {
      const valueSpan = document.getElementById(`scale-val-${slotId}`);
      valueSpan.textContent = `${parseFloat(val).toFixed(2)}x`;
      slotConfigurations[slotId].scale = parseFloat(val);
      
      updateSlotInstance(slotId);
    };

    // Call update lifecycle inside plugin instance
    window.updateSlotInstance = function(slotId) {
      const config = slotConfigurations[slotId];
      const targetContainer = `.slot-${slotId}`;
      
      let customCities = null;

      if (config.plugin === 'clock') {
        const countSelect = document.getElementById(`clock-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`clock-city-${slotId}-${c}`);
            if (citySelect) {
              customCities.push(citySelect.value);
            }
          }
        }
      } else if (config.plugin === 'weather') {
        const countSelect = document.getElementById(`weather-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`weather-city-${slotId}-${c}`);
            if (citySelect) {
              const cityName = citySelect.value;
              if (cityName === 'LOCAL') {
                customCities.push({ name: 'LOCAL', lat: 'LOCAL', lon: 'LOCAL' });
              } else {
                const cityObj = window.WeatherHUD.cityDatabase.find(x => x.name === cityName);
                if (cityObj) {
                  customCities.push({ name: cityObj.name, lat: cityObj.lat, lon: cityObj.lon });
                } else {
                  customCities.push({ name: cityName, lat: 55.6761, lon: 12.5683 });
                }
              }
            }
          }
        }
      }

      const updateParams = {};
      if (config.plugin === 'news') {
        const countSelect = document.getElementById(`news-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          config.streams = [];
          for (let c = 1; c <= count; c++) {
            const streamSelect = document.getElementById(`news-stream-${slotId}-${c}`);
            if (streamSelect) {
              config.streams.push(streamSelect.value);
            }
          }
        }
        updateParams.newsMode = config.newsMode || 'ticker';
        updateParams.glassOpacity = config.opacity;
        updateParams.scale = config.scale;
        updateParams.streams = config.streams || ['global', 'europe', 'finance'];
      } else {
        updateParams.displayType = config.theme;
        updateParams.glassOpacity = config.opacity;
        updateParams.scale = config.scale;
      }

      if (config.customTitle !== undefined) {
        updateParams.customTitle = config.customTitle;
      }

      if (customCities) {
        if (config.plugin === 'clock') {
          updateParams.capitals = customCities;
        } else {
          updateParams.cities = customCities;
        }
      }

      if (config.plugin === 'clock') {
        window.WorldClockHUD.update(targetContainer, updateParams);
      } else if (config.plugin === 'weather') {
        window.WeatherHUD.update(targetContainer, updateParams);
      } else if (config.plugin === 'news') {
        window.NewsHUD.update(targetContainer, updateParams);
      }
    };

    // Mount/remount instance from scratch

      const config = slotConfigurations[slotId];
      const targetContainer = `.slot-${slotId}`;

      if (config.plugin === 'clock') {
        const countSelect = document.getElementById(`clock-count-${slotId}`);

          for (let c = 1; c <= count; c++) {

            if (citySelect) {
              customCities.push(citySelect.value);

          }

        window.WorldClockHUD.init({

          settings: {

            glassOpacity: config.opacity,
            scale: config.scale,
            capitals: customCities || ['Copenhagen', 'Tokyo', 'New York'],
            customTitle: config.customTitle
          }
        });
        window.WorldClockHUD.mount(targetContainer);
      } else if (config.plugin === 'weather') {
        const countSelect = document.getElementById(`weather-count-${slotId}`);
        if (countSelect) {

                customCities.push({ name: 'LOCAL', lat: 'LOCAL', lon: 'LOCAL' });
              } else {
                const cityObj = window.WeatherHUD.cityDatabase.find(x => x.name === cityName);
                if (cityObj) {
                  customCities.push({ name: cityObj.name, lat: cityObj.lat, lon: cityObj.lon });
                } else {
                  customCities.push({ name: cityName, lat: 55.6761, lon: 12.5683 });

              }

          container: targetContainer,
          settings: {
            displayType: config.theme,
            glassOpacity: config.opacity,
            scale: config.scale,
            cities: customCities || [
              { name: 'LOCAL', lat: 'LOCAL', lon: 'LOCAL' },

            scale: config.scale,
            streams: currentStreams || ['global', 'europe', 'finance'],
            customTitle: config.customTitle
          }
        });
        window.NewsHUD.mount(targetContainer);
      }
    }

          theme: 'digital',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined
        };
        slotConfigurations[3] = {
          plugin: 'weather',
          theme: 'zen',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined
        };
      } else if (presetName === 'restaurant') {
        const orientationSelector = document.getElementById('orientation-selector');
        const isLandscape = orientationSelector.value === 'landscape';

        // Set backdrop selector to Canva Layout Board
        videoSelector.value = 'canva';
        handleBackgroundChange('canva');

        // Pre-populate input link if Landscape is active
        const embedLinkInput = document.getElementById('canva-embed-link');
        if (isLandscape) {
          embedLinkInput.value = 'https://www.canva.com/design/DAGFc2-0P8A/view?embed'; // Master embed link for "The Editorial Bistro Menu"
        } else {
          embedLinkInput.value = '';
        }
        updateCanvaEmbed(embedLinkInput.value);
      } else {
        // Blank Canvas (default video is Luxury Hotel Lounge)
        const videoUrl = 'https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4';
        backdrop.src = videoUrl;
        backdrop.load();
        backdrop.play().catch(e => {});
        videoSelector.value = videoUrl;
        handleBackgroundChange(videoUrl);
      }

      // Re-render UI controls
      buildAdminControls();

      // Trigger initialization of active plugins
      for (let i = 1; i <= 9; i++) {
        const config = slotConfigurations[i];
        if (config.plugin !== 'none') {
          handlePluginChange(i, true);
          syncSlotPlugin(i);
        }
      }
    };

    // Custom background and Canva switcher
    window.handleBackgroundChange = function(val) {
      const backdrop = document.getElementById('cinema-backdrop');
      const overlay = document.getElementById('cinema-overlay');
      const canvaContainer = document.getElementById('canva-background-container');
      const canvaSettings = document.getElementById('canva-settings-group');
      const embedLinkInput = document.getElementById('canva-embed-link');

      if (val === 'canva') {
        backdrop.style.display = 'none';
        if (overlay) overlay.style.display = 'none';
        canvaContainer.style.display = 'block';
        canvaSettings.style.display = 'block';
        updateCanvaEmbed(embedLinkInput.value);
      } else {
        canvaContainer.style.display = 'none';
        canvaSettings.style.display = 'none';
        backdrop.style.display = 'block';
        if (overlay) overlay.style.display = 'block';
        
        backdrop.src = val;
        backdrop.load();
        backdrop.play().catch(err => {
          console.warn("Autoplay failed after video change:", err);
        });
      }
    };

    // Update Canva embed source
    window.updateCanvaEmbed = function(url) {
      const container = document.getElementById('canva-background-container');
      const orientationSelector = document.getElementById('orientation-selector');
      const currentOrientation = orientationSelector ? orientationSelector.value : 'landscape';

      const isDefaultOrEmpty = !url || !url.trim() || 
        url.trim() === 'https://www.canva.com/design/DAGFc2-0P8A/view?embed' ||
        url.trim() === 'https://www.canva.com/design/DAGFc2-0P8A/view';

      if (isDefaultOrEmpty) {
        const previewUrl = currentOrientation === 'portrait' 
          ? 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779594844/The_Editorial_Bistro_Menu_for_signagehub_portr%C3%A6t_iu1vjb.png'
          : 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779594846/The_Editorial_Bistro_Menu_for_signagehub_pokoii.png';
        
        container.style.backgroundImage = `url('${previewUrl}')`;
        container.style.backgroundSize = 'cover';
        container.style.backgroundPosition = 'center';
        container.innerHTML = '';
      } else {
        let finalUrl = url.trim();
        if (finalUrl.includes('canva.com/design/') && !finalUrl.includes('embed')) {
          if (finalUrl.includes('?')) {
            finalUrl += '&embed';
          } else {
            finalUrl += '?embed';
          }
        }
        container.style.backgroundImage = 'none';
        container.innerHTML = `<iframe src="${finalUrl}" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>`;
      }
    };

    // Screen orientation toggle handler
    window.toggleOrientation = function(orientation) {
      const body = document.body;
      const videoSelector = document.getElementById('video-selector');
      const selectedVideoVal = videoSelector.value;
      const presetSelector = document.getElementById('preset-selector');
      const canvaEditBtn = document.getElementById('canva-edit-btn');

      if (orientation === 'portrait') {
        body.classList.add('portrait-mode');
        if (canvaEditBtn) {
          canvaEditBtn.href = 'https://canva.link/gk8q8x3iykc1oca';
        }
        // Filter options for Portrait
        videoSelector.innerHTML = `
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4">Luxury Hotel Lounge (Portrait)</option>
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4">Fine Dining Restaurant (Portrait)</option>
          <option value="canva">🎨 Custom Canva Layout Board</option>
        `;
        videoSelector.value = selectedVideoVal;
        
        // If restaurant preset is active, clear Canva link
        if (presetSelector.value === 'restaurant') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          embedLinkInput.value = '';
          updateCanvaEmbed('');
        }

        // If currently in Canva backdrop mode, force refresh preview/iframe
        if (selectedVideoVal === 'canva') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          updateCanvaEmbed(embedLinkInput.value);
        }

        // Portrait activates portrait layout configurations: adjust slot scales for vertical fit
        for (let i = 1; i <= 9; i++) {
          const config = slotConfigurations[i];
          if (config.plugin !== 'none') {
            config.scale = Math.min(config.scale, 0.45);
            updateSlotInstance(i);
          }
        }
        buildAdminControls();
      } else {
        body.classList.remove('portrait-mode');
        if (canvaEditBtn) {
          canvaEditBtn.href = 'https://canva.link/qtdk4f6jz096vtm';
        }
        // Filter options for Landscape
        videoSelector.innerHTML = `
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4">Luxury Hotel Lounge</option>
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4">Fine Dining Restaurant</option>
          <option value="canva">🎨 Custom Canva Layout Board</option>
        `;
        videoSelector.value = selectedVideoVal;
        
        // If restaurant preset is active, pre-populate Canva link
        if (presetSelector.value === 'restaurant') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          embedLinkInput.value = 'https://www.canva.com/design/DAGFc2-0P8A/view?embed';
          updateCanvaEmbed(embedLinkInput.value);
        }

        // If currently in Canva backdrop mode, force refresh preview/iframe
        if (selectedVideoVal === 'canva') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          updateCanvaEmbed(embedLinkInput.value);
        }

        for (let i = 1; i <= 9; i++) {
          const config = slotConfigurations[i];
          if (config.plugin !== 'none') {
            config.scale = 0.5;
            updateSlotInstance(i);
          }
        }
        buildAdminControls();
      }
    };

    // Show/Hide Panel Drawer Logic
    function setupDrawerToggler() {
      const btn = document.getElementById('btn-toggle-controls');
      const panel = document.getElementById('master-control-panel');

      btn.addEventListener('click', () => {
        const isHidden = panel.classList.toggle('drawer-hidden');
        if (isHidden) {
          btn.classList.add('controls-closed');
          btn.querySelector('.btn-text').textContent = 'SHOW MASTER PANEL';
        } else {
          btn.classList.remove('controls-closed');
          btn.querySelector('.btn-text').textContent = 'HIDE MASTER PANEL';
        }
      });
    }

    // Cinematic Background Environment Selector Listener
    function setupVideoSelector() {
      const selector = document.getElementById('video-selector');
      selector.addEventListener('change', () => {
        handleBackgroundChange(selector.value);
      });
    }
  </script>
</body>
</html>
