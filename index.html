<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignageHub Master Platform</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Global Reset & Base Styling */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030305;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      user-select: none;
    }

    /* Fixed Cinematic Underlay Backdrop */
    #cinema-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
    }

    /* Cinematic Overlay shading to enhance visibility */
    #cinema-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Global 3x3 Layout Grid Matrix Layer */
    #layout-matrix {
      position: fixed;
      top: 0;
      left: 0;
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      grid-template-rows: repeat(3, minmax(0, 1fr)) !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-sizing: border-box;
      z-index: 10000;
      pointer-events: none; /* Ignore pointer events on grid itself */
    }

    /* Grid Slot Styling & Transform Origins for Edge Alignment */
    .matrix-slot {
      pointer-events: auto; /* Re-enable pointer events inside slots for interactive elements */
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 100% !important;
      height: 100% !important;
      position: relative !important; /* CRITICAL ANCHOR */
      overflow: visible !important;
    }

    /* Explicit Row/Column Matrix coordinates and alignments */
    .slot-1 {
      grid-row: 1;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top left;
    }
    .slot-2 {
      grid-row: 1;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top center;
    }
    .slot-3 {
      grid-row: 1;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top right;
    }
    .slot-4 {
      grid-row: 2;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center left;
    }
    .slot-5 {
      grid-row: 2;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center center;
    }
    .slot-6 {
      grid-row: 2;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center right;
    }
    .slot-7 {
      grid-row: 3;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom left;
    }
    .slot-8 {
      grid-row: 3;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom center;
    }
    .slot-9 {
      grid-row: 3;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom right;
    }

    /* 9-Slot Administrative Control Dashboard (Glassmorphic) */
    #master-control-panel {
      position: fixed;
      right: 24px;
      top: 24px;
      bottom: 24px;
      width: 380px;
      height: calc(100vh - 48px);
      z-index: 30000 !important;
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      background: rgba(10, 14, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Hidden Drawer State */
    #master-control-panel.drawer-hidden {
      transform: translateX(430px);
      opacity: 0;
    }

    /* Dashboard Header */
    .panel-header-block {
      padding: 24px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.05em;
      margin: 0;
      background: linear-gradient(135deg, #00f0ff 0%, #7000ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .panel-subtitle {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Scrollable Slot Configuration Grid */
    .panel-body-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Custom Scrollbar */
    .panel-body-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .panel-body-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Accordion Control Blocks - Totally Unclipped */
    .slot-config-block {
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      overflow: visible; /* Ensure nothing is hidden or clipped */
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .slot-config-block.active-slot {
      border-color: rgba(0, 240, 255, 0.25);
      background: rgba(0, 240, 255, 0.02);
    }

    .slot-accordion-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.7);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      transition: background 0.2s ease;
    }

    .slot-accordion-header:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
    }

    .slot-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.3s ease;
    }

    .active-slot .slot-status-dot {
      background: #00f0ff;
      box-shadow: 0 0 10px #00f0ff;
    }

    .slot-accordion-body {
      padding: 0 20px 20px 20px;
      display: none; /* Accordion state */
      flex-direction: column;
      gap: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 16px;
      overflow: visible; /* Ensure inner elements are unclipped */
    }

    .slot-config-block.open-block .slot-accordion-body {
      display: flex;
    }

    /* Control Inputs */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }
    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    select option {
      background: #0e111a;
      color: #ffffff;
    }

    /* Range Sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .slider-value {
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      color: rgba(255, 255, 255, 0.6);
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      flex: 1;
      width: 100%;
      padding: 0;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      box-sizing: border-box;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00f0ff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
      transition: background 0.15s, transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #ffffff;
      transform: scale(1.2);
    }

    /* Sub Settings Container Specific */
    .sub-settings-panel {
      border: 1px dashed rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.01);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    /* Ultimate Visibility Control Toggler */
    #btn-toggle-controls {
      position: fixed;
      bottom: 30px;
      right: 428px; /* Offset next to the panel */
      z-index: 40000 !important;
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      background: rgba(10, 14, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      color: #ffffff;
      padding: 14px 22px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #btn-toggle-controls.controls-closed {
      right: 30px;
    }

    #btn-toggle-controls:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    #btn-toggle-controls:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <!-- Fixed Luxury Backdrop Cinematic Video Loop -->
  <video id="cinema-backdrop" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Cinematic Shade Layer -->
  <div id="cinema-overlay"></div>

  <!-- The Global 3x3 Coordinate Matrix Grid -->
  <div id="layout-matrix">
    <div class="matrix-slot slot-1" id="grid-slot-1"></div>
    <div class="matrix-slot slot-2" id="grid-slot-2"></div>
    <div class="matrix-slot slot-3" id="grid-slot-3"></div>
    <div class="matrix-slot slot-4" id="grid-slot-4"></div>
    <div class="matrix-slot slot-5" id="grid-slot-5"></div>
    <div class="matrix-slot slot-6" id="grid-slot-6"></div>
    <div class="matrix-slot slot-7" id="grid-slot-7"></div>
    <div class="matrix-slot slot-8" id="grid-slot-8"></div>
    <div class="matrix-slot slot-9" id="grid-slot-9"></div>
  </div>

  <!-- Visibility Control Button -->
  <button id="btn-toggle-controls">
    <span class="eye-icon">👁️</span>
    <span class="btn-text">Vis/Skjul Master Panel</span>
  </button>

  <!-- Master Administrative Panel -->
  <div id="master-control-panel">
    <div class="panel-header-block">
      <h1 class="panel-title">SignageHub Manager</h1>
      <div class="panel-subtitle">Modular Layout Engine</div>
      
      <!-- Cinematic Background Selector -->
      <div class="control-group" style="margin-top: 18px;">
        <label class="control-label">Vælg Baggrunds-Miljø</label>
        <select id="video-selector">
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4">Luxury Hotel Lounge</option>
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4">Fine Dining Restaurant</option>
        </select>
      </div>
    </div>
    
    <div class="panel-body-scroll" id="slots-controls-container">
      <!-- 9 Slot Controllers will be injected dynamically -->
    </div>
  </div>

  <!-- Load Dumb Scoped Plugins -->
  <script src="apps/world-clock-hud/plugin.js"></script>
  <script src="apps/weather-hud/plugin.js"></script>

  <!-- Application Initialization Script -->
  <script>
    const clockThemes = [
      { value: 'digital', label: '🕒 Digital Standard' },
      { value: 'analog', label: '🕒 Analog Sweep' },
      { value: 'flip', label: '🕒 Airport Flip' },
      { value: 'boardroom', label: '🕒 Executive Boardroom' },
      { value: 'hotel', label: '🕒 Luxury Hotel' },
      { value: 'trading', label: '🕒 Trading Floor' },
      { value: 'mission', label: '🕒 Mission Control' },
      { value: 'maritime', label: '🕒 Maritime Chronometer' },
      { value: 'metro', label: '🕒 Metro Transit' },
      { value: 'noir', label: '🕒 Noir Cinema' },
      { value: 'crt', label: '🕒 Retro CRT' },
      { value: 'observatory', label: '🕒 Observatory' },
      { value: 'zen', label: '🕒 Minimal Zen' }
    ];

    const weatherThemes = [
      { value: 'standard', label: '☀️ Standard Dark Glass' },
      { value: 'aviation', label: '☀️ Aviation METAR' },
      { value: 'ambient', label: '☀️ Ambient Climate' },
      { value: 'alert', label: '☀️ Weather Alert' },
      { value: 'boardroom', label: '☀️ Executive Boardroom' },
      { value: 'hotel', label: '☀️ Luxury Hotel' },
      { value: 'metro', label: '☀️ Metro Transit' },
      { value: 'crt', label: '☀️ Retro CRT' },
      { value: 'observatory', label: '☀️ Observatory' },
      { value: 'maritime', label: '☀️ Maritime Chronometer' },
      { value: 'noir', label: '☀️ Noir Cinema' },
      { value: 'zen', label: '☀️ Minimal Zen' },
      { value: 'aicore', label: '☀️ AI Core Mode' }
    ];

    // Human-Readable Spatial Display Zone Names
    const slotNames = {
      1: "Top Left",
      2: "Top Center",
      3: "Top Right",
      4: "Middle Left",
      5: "Middle Center",
      6: "Middle Right",
      7: "Bottom Left",
      8: "Bottom Center",
      9: "Bottom Right"
    };

    // State object for configurations in the dashboard
    const slotConfigurations = {};

    // Initialize default properties for all 9 slots
    for (let i = 1; i <= 9; i++) {
      slotConfigurations[i] = {
        plugin: 'none', // none, clock, weather
        theme: '',
        opacity: 0.8,
        scale: 1.0,
        customTitle: undefined
      };
    }

    // Set some premium defaults on first load so it's gorgeous out of the box!
    slotConfigurations[2] = { plugin: 'clock', theme: 'analog', opacity: 0.8, scale: 1.0 };
    slotConfigurations[8] = { plugin: 'weather', theme: 'ambient', opacity: 0.8, scale: 1.0 };

    document.addEventListener('DOMContentLoaded', () => {
      buildAdminControls();
      setupDrawerToggler();
      setupVideoSelector();
      initializeDefaults();
    });

    // Mount initial defaults
    function initializeDefaults() {
      for (let i = 1; i <= 9; i++) {
        const config = slotConfigurations[i];
        if (config.plugin !== 'none') {
          handlePluginChange(i, true);
          syncSlotPlugin(i);
        }
      }
    }

    // Build the 9 collapsible accordion control items dynamically
    function buildAdminControls() {
      const container = document.getElementById('slots-controls-container');
      container.innerHTML = '';

      for (let i = 1; i <= 9; i++) {
        const config = slotConfigurations[i];
        const block = document.createElement('div');
        block.className = `slot-config-block slot-block-${i}`;
        if (config.plugin !== 'none') block.classList.add('active-slot');
        // Let slot 2 and 8 be open by default
        if (i === 2 || i === 8) block.classList.add('open-block');

        block.innerHTML = `
          <div class="slot-accordion-header" onclick="toggleAccordion(${i})">
            <span>${slotNames[i].toUpperCase()} ZONE</span>
            <div class="slot-status-dot"></div>
          </div>
          <div class="slot-accordion-body">
            <!-- Plugin Selector -->
            <div class="control-group">
              <label class="control-label">Aktiv Modul</label>
              <select id="plugin-select-${i}" onchange="handlePluginChange(${i})">
                <option value="none" ${config.plugin === 'none' ? 'selected' : ''}>[ Ingen / Tom ]</option>
                <option value="clock" ${config.plugin === 'clock' ? 'selected' : ''}>🕒 World Clock HUD</option>
                <option value="weather" ${config.plugin === 'weather' ? 'selected' : ''}>☀️ Weather HUD</option>
              </select>
            </div>

            <!-- Dynamic Settings Injection Container -->
            <div id="sub-settings-container-${i}"></div>

            <!-- Dynamic Theme Selector -->
            <div class="control-group" id="theme-group-${i}" style="display: ${config.plugin === 'none' ? 'none' : 'flex'}">
              <label class="control-label">Design Tema</label>
              <select id="theme-select-${i}" onchange="handleThemeChange(${i})">
                <!-- Injected via javascript -->
              </select>
            </div>

            <!-- Opacity Range Slider -->
            <div class="control-group" id="opacity-group-${i}" style="display: ${config.plugin === 'none' ? 'none' : 'flex'}">
              <label class="control-label">Glastonethed (Opacity)</label>
              <div class="slider-row">
                <input type="range" id="opacity-slider-${i}" min="0" max="1" step="0.05" value="${config.opacity}" oninput="handleOpacityChange(${i}, this.value)">
                <span class="slider-value" id="opacity-val-${i}">${Math.round(config.opacity * 100)}%</span>
              </div>
            </div>

            <!-- Scale Range Slider -->
            <div class="control-group" id="scale-group-${i}" style="display: ${config.plugin === 'none' ? 'none' : 'flex'}">
              <label class="control-label">Skalering (Scale)</label>
              <div class="slider-row">
                <input type="range" id="scale-slider-${i}" min="0.5" max="1.5" step="0.05" value="${config.scale}" oninput="handleScaleChange(${i}, this.value)">
                <span class="slider-value" id="scale-val-${i}">${parseFloat(config.scale).toFixed(2)}x</span>
              </div>
            </div>
          </div>
        `;
        
        container.appendChild(block);
      }
    }

    // Toggle Collapsible Accordions
    window.toggleAccordion = function(slotId) {
      const block = document.querySelector(`.slot-block-${slotId}`);
      if (block) {
        block.classList.toggle('open-block');
      }
    };

    // Populate theme dropdown values depending on active plugin
    function populateThemes(slotId, pluginType, selectedValue) {
      const select = document.getElementById(`theme-select-${slotId}`);
      if (!select) return;
      
      select.innerHTML = '';
      const list = pluginType === 'clock' ? clockThemes : weatherThemes;
      
      list.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.value;
        opt.textContent = item.label;
        if (item.value === selectedValue) opt.selected = true;
        select.appendChild(opt);
      });
    }

    // Handle Plugin Dropdown Changes
    window.handlePluginChange = function(slotId, isInitialLoad = false) {
      const select = document.getElementById(`plugin-select-${slotId}`);
      const type = select.value;
      const config = slotConfigurations[slotId];
      const block = document.querySelector(`.slot-block-${slotId}`);
      const subContainer = document.getElementById(`sub-settings-container-${slotId}`);
      
      if (!isInitialLoad) {
        // Clean up previous mounts strictly targeting target grid class
        window.WorldClockHUD.unmount(`.slot-${slotId}`);
        window.WeatherHUD.unmount(`.slot-${slotId}`);
        window.WorldClockHUD.destroy(`.slot-${slotId}`);
        window.WeatherHUD.destroy(`.slot-${slotId}`);
        
        const targetGridElement = document.querySelector(`.slot-${slotId}`);
        if (targetGridElement) {
          targetGridElement.innerHTML = '';
        }
      }

      config.plugin = type;

      if (type === 'none') {
        block.classList.remove('active-slot');
        subContainer.innerHTML = '';
        document.getElementById(`theme-group-${slotId}`).style.display = 'none';
        document.getElementById(`opacity-group-${slotId}`).style.display = 'none';
        document.getElementById(`scale-group-${slotId}`).style.display = 'none';
      } else {
        block.classList.add('active-slot');
        document.getElementById(`theme-group-${slotId}`).style.display = 'flex';
        document.getElementById(`opacity-group-${slotId}`).style.display = 'flex';
        document.getElementById(`scale-group-${slotId}`).style.display = 'flex';
        
        // Dynamically inject sub-controls
        injectSubControls(slotId, type);
        
        // Set default theme for plugin
        if (!config.theme) {
          config.theme = type === 'clock' ? 'digital' : 'standard';
        }
        populateThemes(slotId, type, config.theme);
        
        if (!isInitialLoad) {
          syncSlotPlugin(slotId);
        }
      }
    };

    // Inject dynamic dropdown selects for capitals or regional grouped cities
    function injectSubControls(slotId, type) {
      const subContainer = document.getElementById(`sub-settings-container-${slotId}`);
      if (!subContainer) return;

      subContainer.innerHTML = '';
      const panelDiv = document.createElement('div');
      panelDiv.className = 'sub-settings-panel';
      const config = slotConfigurations[slotId];

      if (type === 'clock') {
        panelDiv.innerHTML = `
          <div class="control-group" style="margin-bottom: 8px;">
            <label class="control-label">Brugerdefineret Titel (Efterlad tom for at skjule)</label>
            <input type="text" id="custom-title-${slotId}" placeholder="WORLD TIME MONITOR" value="${config.customTitle !== undefined ? config.customTitle : ''}" oninput="handleCustomTitleChange(${slotId}, this.value)">
          </div>
          <div class="control-group">
            <label class="control-label">Antal Ure</label>
            <select id="clock-count-${slotId}" onchange="handleClockCountChange(${slotId})">
              <option value="1">1 ur</option>
              <option value="2">2 ure</option>
              <option value="3" selected>3 ure</option>
              <option value="4">4 ure</option>
              <option value="5">5 ure</option>
              <option value="6">6 ure</option>
              <option value="7">7 ure</option>
              <option value="8">8 ure</option>
              <option value="9">9 ure</option>
            </select>
          </div>
          <div id="clock-cities-container-${slotId}" style="display: flex; flex-direction: column; gap: 8px;"></div>
        `;
        subContainer.appendChild(panelDiv);
        handleClockCountChange(slotId, true);
      } else if (type === 'weather') {
        panelDiv.innerHTML = `
          <div class="control-group" style="margin-bottom: 8px;">
            <label class="control-label">Brugerdefineret Titel (Efterlad tom for at skjule)</label>
            <input type="text" id="custom-title-${slotId}" placeholder="METEOROLOGICAL REPORT" value="${config.customTitle !== undefined ? config.customTitle : ''}" oninput="handleCustomTitleChange(${slotId}, this.value)">
          </div>
          <div class="control-group">
            <label class="control-label">Antal Byer</label>
            <select id="weather-count-${slotId}" onchange="handleWeatherCountChange(${slotId})">
              <option value="1">1 by</option>
              <option value="2">2 byer</option>
              <option value="3" selected>3 byer</option>
              <option value="4">4 byer</option>
              <option value="5">5 byer</option>
              <option value="6">6 byer</option>
              <option value="7">7 byer</option>
              <option value="8">8 byer</option>
              <option value="9">9 byer</option>
            </select>
          </div>
          <div id="weather-cities-container-${slotId}" style="display: flex; flex-direction: column; gap: 8px;"></div>
        `;
        subContainer.appendChild(panelDiv);
        handleWeatherCountChange(slotId, true);
      }
    }

    // Build the Clock cities sub dropdown items
    window.handleClockCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`clock-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const citiesContainer = document.getElementById(`clock-cities-container-${slotId}`);
      if (!citiesContainer) return;

      citiesContainer.innerHTML = '';

      const availableCapitals = Object.keys(window.WorldClockHUD._capitalTimezones);
      // Premium selection fallbacks to prevent identical starting selections
      const defaultCapitals = ['Copenhagen', 'Tokyo', 'New York', 'London', 'Singapore', 'Sydney', 'Los Angeles', 'Dubai', 'Paris', 'Berlin'];

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        group.innerHTML = `
          <label class="control-label">Ur ${c}</label>
          <select id="clock-city-${slotId}-${c}" onchange="updateSlotInstance(${slotId})">
            ${availableCapitals.map(cap => `<option value="${cap}" ${cap === defaultCapitals[(c - 1) % defaultCapitals.length] ? 'selected' : ''}>${cap}</option>`).join('')}
          </select>
        `;
        citiesContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    // Build the Weather regional optgroups sub dropdown items
    window.handleWeatherCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`weather-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const citiesContainer = document.getElementById(`weather-cities-container-${slotId}`);
      if (!citiesContainer) return;

      citiesContainer.innerHTML = '';

      // Build optgroup HTML dynamically based on regions
      const regionsMap = {};
      window.WeatherHUD.cityDatabase.forEach(city => {
        if (!regionsMap[city.region]) regionsMap[city.region] = [];
        regionsMap[city.region].push(city.name);
      });

      let optGroupsHtml = `<option value="LOCAL">📍 Aktuel Lokation (LOCAL)</option>`;
      for (const region in regionsMap) {
        optGroupsHtml += `<optgroup label="${region}">`;
        regionsMap[region].forEach(cityName => {
          optGroupsHtml += `<option value="${cityName}">${cityName}</option>`;
        });
        optGroupsHtml += `</optgroup>`;
      }

      // Default city selector mappings to prevent overlaps
      const defaultCities = ['LOCAL', 'Copenhagen', 'New York', 'Tokyo', 'London', 'Paris', 'Sydney', 'Cairo', 'Singapore'];

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        
        // Match default selections if possible
        const defaultChoice = defaultCities[(c - 1) % defaultCities.length];
        
        let tempHtml = optGroupsHtml;
        if (defaultChoice !== 'LOCAL') {
          // Add selected trigger to option tag
          tempHtml = tempHtml.replace(`value="${defaultChoice}"`, `value="${defaultChoice}" selected`);
        } else {
          tempHtml = tempHtml.replace(`value="LOCAL"`, `value="LOCAL" selected`);
        }

        group.innerHTML = `
          <label class="control-label">By ${c}</label>
          <select id="weather-city-${slotId}-${c}" onchange="updateSlotInstance(${slotId})">
            ${tempHtml}
          </select>
        `;
        citiesContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    // Handle Custom Title Input changes
    window.handleCustomTitleChange = function(slotId, val) {
      slotConfigurations[slotId].customTitle = val;
      updateSlotInstance(slotId);
    };

    // Handle theme dropdown selection changes
    window.handleThemeChange = function(slotId) {
      const select = document.getElementById(`theme-select-${slotId}`);
      const val = select.value;
      slotConfigurations[slotId].theme = val;
      
      updateSlotInstance(slotId);
    };

    // Handle Opacity Slider Dragging
    window.handleOpacityChange = function(slotId, val) {
      const valueSpan = document.getElementById(`opacity-val-${slotId}`);
      valueSpan.textContent = `${Math.round(val * 100)}%`;
      slotConfigurations[slotId].opacity = parseFloat(val);
      
      updateSlotInstance(slotId);
    };

    // Handle Scale Slider Dragging
    window.handleScaleChange = function(slotId, val) {
      const valueSpan = document.getElementById(`scale-val-${slotId}`);
      valueSpan.textContent = `${parseFloat(val).toFixed(2)}x`;
      slotConfigurations[slotId].scale = parseFloat(val);
      
      updateSlotInstance(slotId);
    };

    // Call update lifecycle inside plugin instance
    window.updateSlotInstance = function(slotId) {
      const config = slotConfigurations[slotId];
      const targetContainer = `.slot-${slotId}`;
      
      let customCities = null;

      if (config.plugin === 'clock') {
        const countSelect = document.getElementById(`clock-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`clock-city-${slotId}-${c}`);
            if (citySelect) {
              customCities.push(citySelect.value);
            }
          }
        }
      } else if (config.plugin === 'weather') {
        const countSelect = document.getElementById(`weather-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`weather-city-${slotId}-${c}`);
            if (citySelect) {
              const cityName = citySelect.value;
              if (cityName === 'LOCAL') {
                customCities.push({ name: 'LOCAL', lat: 'LOCAL', lon: 'LOCAL' });
              } else {
                const cityObj = window.WeatherHUD.cityDatabase.find(x => x.name === cityName);
                if (cityObj) {
                  customCities.push({ name: cityObj.name, lat: cityObj.lat, lon: cityObj.lon });
                } else {
                  customCities.push({ name: cityName, lat: 55.6761, lon: 12.5683 });
                }
              }
            }
          }
        }
      }

      const updateParams = {
        displayType: config.theme,
        glassOpacity: config.opacity,
        scale: config.scale
      };

      if (config.customTitle !== undefined) {
        updateParams.customTitle = config.customTitle;
      }

      if (customCities) {
        if (config.plugin === 'clock') {
          updateParams.capitals = customCities;
        } else {
          updateParams.cities = customCities;
        }
      }

      if (config.plugin === 'clock') {
        window.WorldClockHUD.update(targetContainer, updateParams);
      } else if (config.plugin === 'weather') {
        window.WeatherHUD.update(targetContainer, updateParams);
      }
    };

    // Mount/remount instance from scratch
    function syncSlotPlugin(slotId) {
      const config = slotConfigurations[slotId];
      const targetContainer = `.slot-${slotId}`;

      let customCities = null;

      if (config.plugin === 'clock') {
        const countSelect = document.getElementById(`clock-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`clock-city-${slotId}-${c}`);
            if (citySelect) {
              customCities.push(citySelect.value);
            }
          }
        }

        window.WorldClockHUD.init({
          container: targetContainer,
          settings: {
            displayType: config.theme,
            glassOpacity: config.opacity,
            scale: config.scale,
            capitals: customCities || ['Copenhagen', 'Tokyo', 'New York'],
            customTitle: config.customTitle
          }
        });
        window.WorldClockHUD.mount(targetContainer);
      } else if (config.plugin === 'weather') {
        const countSelect = document.getElementById(`weather-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`weather-city-${slotId}-${c}`);
            if (citySelect) {
              const cityName = citySelect.value;
              if (cityName === 'LOCAL') {
                customCities.push({ name: 'LOCAL', lat: 'LOCAL', lon: 'LOCAL' });
              } else {
                const cityObj = window.WeatherHUD.cityDatabase.find(x => x.name === cityName);
                if (cityObj) {
                  customCities.push({ name: cityObj.name, lat: cityObj.lat, lon: cityObj.lon });
                } else {
                  customCities.push({ name: cityName, lat: 55.6761, lon: 12.5683 });
                }
              }
            }
          }
        }

        window.WeatherHUD.init({
          container: targetContainer,
          settings: {
            displayType: config.theme,
            glassOpacity: config.opacity,
            scale: config.scale,
            cities: customCities || [
              { name: 'LOCAL', lat: 'LOCAL', lon: 'LOCAL' },
              { name: 'Copenhagen', lat: 55.6761, lon: 12.5683 },
              { name: 'New York', lat: 40.7128, lon: -74.0060 }
            ],
            customTitle: config.customTitle
          }
        });
        window.WeatherHUD.mount(targetContainer);
      }
    }

    // Show/Hide Panel Drawer Logic
    function setupDrawerToggler() {
      const btn = document.getElementById('btn-toggle-controls');
      const panel = document.getElementById('master-control-panel');

      btn.addEventListener('click', () => {
        const isHidden = panel.classList.toggle('drawer-hidden');
        if (isHidden) {
          btn.classList.add('controls-closed');
          btn.querySelector('.btn-text').textContent = 'Vis Master Panel';
        } else {
          btn.classList.remove('controls-closed');
          btn.querySelector('.btn-text').textContent = 'Skjul Master Panel';
        }
      });
    }

    // Cinematic Background Environment Selector Listener
    function setupVideoSelector() {
      const selector = document.getElementById('video-selector');
      const backdrop = document.getElementById('cinema-backdrop');

      selector.addEventListener('change', () => {
        const newUrl = selector.value;
        backdrop.src = newUrl;
        backdrop.load();
        backdrop.play().catch(err => {
          console.warn("Autoplay failed after video change, wait for user interaction:", err);
        });
      });
    }
  </script>
</body>
</html>
