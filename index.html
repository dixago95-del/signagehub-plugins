<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Global Shared Context Event Bus -->
  <script>
    window.SignageHubEventBus = new EventTarget();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignageHub Master Platform</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #030305;
      --bg-secondary: #0a0e18;
      --glass-fill: rgba(20, 24, 32, 0.72);
      --glass-border: rgba(255, 255, 255, 0.05);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.45);
      --accent-primary: #00f0ff;
      --shadow-soft: 0 4px 18px rgba(0, 0, 0, 0.18);
      --glow-accent: 0 0 10px rgba(0, 240, 255, 0.3);
      --color-danger: #ff453a;

      /* Elevation Level 4 Tokens */
      --elevation-4-opacity: 0.90;
      --elevation-4-blur: 24px;
      --elevation-4-bg: rgba(18, 22, 30, 0.90);
      --elevation-4-border: 1px solid rgba(255, 255, 255, 0.08);
      --elevation-4-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
    }

    /* Spatial Elevation Hierarchy */
    .elevation-level-0 {
      opacity: 1 !important;
      backdrop-filter: blur(0px) !important;
      -webkit-backdrop-filter: blur(0px) !important;
      background: transparent !important;
      border: 1px solid rgba(255, 255, 255, 0) !important;
      box-shadow: none !important;
    }
    .elevation-level-1 {
      opacity: 0.72 !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      background: rgba(20, 24, 32, 0.72) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      box-shadow: var(--shadow-soft) !important;
    }
    .elevation-level-2 {
      opacity: 0.78 !important;
      backdrop-filter: blur(14px) !important;
      -webkit-backdrop-filter: blur(14px) !important;
      background: rgba(24, 28, 36, 0.78) !important;
      border: 1px solid rgba(255, 255, 255, 0.06) !important;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22) !important;
    }
    .elevation-level-3 {
      opacity: 0.84 !important;
      backdrop-filter: blur(18px) !important;
      -webkit-backdrop-filter: blur(18px) !important;
      background: rgba(28, 32, 44, 0.84) !important;
      border: 1px solid rgba(120, 160, 255, 0.18) !important;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.28) !important;
    }
    .elevation-level-4 {
      opacity: 0.90 !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      background: rgba(18, 22, 30, 0.90) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38) !important;
    }
    .elevation-level-5 {
      opacity: 0.94 !important;
      backdrop-filter: blur(30px) !important;
      -webkit-backdrop-filter: blur(30px) !important;
      background: rgba(12, 16, 24, 0.94) !important;
      border: 1px solid rgba(120, 180, 255, 0.22) !important;
      box-shadow: 0 22px 64px rgba(0, 0, 0, 0.46) !important;
    }

    /* Global Reset & Base Styling */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      user-select: none;
    }

    body.blank-canvas-active {
      background: #FFFFFF !important;
    }

    /* Fixed Cinematic Underlay Backdrop */
    #bg-video-container,
    #cinema-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
    }

    /* Cinematic Overlay shading to enhance visibility */
    #cinema-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Canva Background Container & Crop styling */
    #canva-background-container {
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      display: none;
    }
    #canva-background-container iframe {
      width: 100%;
      height: calc(100% + 50px);
      transform: scale(1.05);
      transform-origin: top center;
      border: none;
      pointer-events: none;
    }

    /* Screen Simulator Portrait Overrides */
    body.portrait-mode #bg-video-container,
    body.portrait-mode #cinema-backdrop,
    body.portrait-mode #cinema-overlay,
    body.portrait-mode #layout-matrix,
    body.portrait-mode #canva-background-container {
      width: calc(100vh * 9 / 16) !important;
      height: 100vh !important;
      left: 50% !important;
      right: auto !important;
      transform: translateX(-50%) !important;
    }

    /* Global 3x3 Layout Grid Matrix Layer */
    #layout-matrix {
      position: fixed;
      top: 0;
      left: 0;
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      grid-template-rows: repeat(3, minmax(0, 1fr)) !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-sizing: border-box;
      z-index: 10000;
      pointer-events: none; /* Ignore pointer events on grid itself */
    }

    /* Grid Slot Styling & Transform Origins for Edge Alignment */
    .matrix-slot {
      pointer-events: auto; /* Re-enable pointer events inside slots for interactive elements */
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 100% !important;
      height: 100% !important;
      position: relative !important; /* CRITICAL ANCHOR */
      overflow: visible !important;
    }

    /* Explicit Row/Column Matrix coordinates and alignments */
    /* Spatial Composer Grid Wrapper and Fit Overrides */
    .spatial-composer-wrapper {
      pointer-events: auto;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex !important;
      position: relative !important;
      overflow: visible !important;
      width: 100% !important;
      height: 100% !important;
      box-sizing: border-box;
      border-radius: calc(24px * var(--widget-zoom, 1.0)) !important;
      padding: calc(24px * var(--widget-zoom, 1.0)) !important;
    }

    /* Enforce 100% width/height for slot descendants of fit-fill & fit-auto wrappers to keep layout unified */
    .fit-fill,
    .fit-fill > div,
    .fit-fill > div > div,
    .fit-auto > div,
    .fit-auto > div > div {
      width: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
    }

    .fit-fill {
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: stretch !important;
      justify-content: stretch !important;
    }
    .fit-fill > * {
      width: 100% !important;
      height: 100% !important;
      object-fit: fill !important;
    }
    .fit-fill canvas,
    .fit-fill iframe {
      width: 100% !important;
      height: 100% !important;
      object-fit: fill !important;
    }

    .fit-cover {
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
    }
    .fit-cover > * {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
    .fit-cover canvas,
    .fit-cover iframe {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    .fit-contain {
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
    }
    .fit-contain > * {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }
    .fit-contain canvas,
    .fit-contain iframe {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }

    .fit-auto {
      width: fit-content !important;
      height: fit-content !important;
      max-width: 100% !important;
      max-height: 100% !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      box-sizing: border-box !important;
    }
    .fit-auto > * {
      width: 100% !important;
      height: 100% !important;
      box-sizing: border-box !important;
    }
    .fit-auto canvas,
    .fit-auto iframe {
      object-fit: none !important;
    }

    /* 3x3 Mini-Grid Clickable Composer Styling */
    .composer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
      aspect-ratio: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    .composer-cell {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      user-select: none;
    }
    .composer-cell:hover {
      background: rgba(0, 240, 255, 0.1);
      border-color: rgba(0, 240, 255, 0.3);
      color: #00f0ff;
    }
    .composer-cell.selected {
      background: rgba(0, 240, 255, 0.25);
      border-color: #00f0ff;
      color: #ffffff;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    /* Instance list styling */
    .widget-instance-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-fill);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .widget-instance-item:hover, .widget-instance-item.active {
      background: rgba(0, 240, 255, 0.1);
      border-color: var(--accent-primary);
    }
    .widget-instance-item span {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .widget-instance-item button {
      background: rgba(255, 69, 58, 0.15);
      border: 1px solid rgba(255, 69, 58, 0.3);
      color: var(--color-danger);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      cursor: pointer;
    }
    .widget-instance-item button:hover {
      background: rgba(255, 69, 58, 0.3);
    }

    /* 9-Slot Administrative Control Dashboard (Glassmorphic) */
    #master-control-panel {
      position: fixed;
      right: 24px;
      top: 24px;
      bottom: 24px;
      width: 380px;
      height: calc(100vh - 48px);
      z-index: 30000 !important;
      opacity: var(--elevation-4-opacity);
      backdrop-filter: blur(var(--elevation-4-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--elevation-4-blur)) saturate(180%);
      background: var(--elevation-4-bg);
      border: var(--elevation-4-border);
      border-radius: 28px;
      box-shadow: var(--elevation-4-shadow);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Hidden Drawer State */
    #master-control-panel.drawer-hidden {
      transform: translateX(430px);
      opacity: 0;
    }

    /* Dashboard Header */
    .panel-header-block {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.05em;
      margin: 0;
      background: linear-gradient(135deg, #00f0ff 0%, #7000ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .panel-subtitle {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Scrollable Slot Configuration Grid */
    .panel-body-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Custom Scrollbar */
    .panel-body-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .panel-body-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Accordion Control Blocks - Totally Unclipped */
    .slot-config-block {
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      overflow: visible; /* Ensure nothing is hidden or clipped */
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .slot-config-block.active-slot {
      border-color: rgba(0, 240, 255, 0.25);
      background: rgba(0, 240, 255, 0.02);
    }

    .slot-accordion-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.7);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      transition: background 0.2s ease;
    }

    .slot-accordion-header:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
    }

    .slot-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.3s ease;
    }

    .active-slot .slot-status-dot {
      background: var(--accent-primary);
      box-shadow: var(--glow-accent);
    }

    .slot-accordion-body {
      padding: 0 20px 20px 20px;
      display: none; /* Accordion state */
      flex-direction: column;
      gap: 14px;
      border-top: 1px solid var(--glass-border);
      padding-top: 16px;
      overflow: visible; /* Ensure inner elements are unclipped */
    }

    .slot-config-block.open-block .slot-accordion-body {
      display: flex;
    }

    /* Control Inputs */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input[type="text"] {
      width: 100%;
      background: var(--glass-fill);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }
    input[type="text"]::placeholder {
      color: var(--text-secondary);
    }

    select optgroup, #preset-selector optgroup {
      background: var(--bg-primary); /* Matches our dark premium manager theme panel */
      color: var(--text-secondary);      /* Crisp, high-contrast subtle grey/blue for category text */
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 6px 10px;
    }
    select option, #preset-selector option {
      background: var(--bg-secondary); /* Ensures normal dropdown items contrast against headers */
      color: var(--text-primary);
    }


    /* Dynamic player view weather radar legend */
    .sh-radar-legend-container {
      display: flex;
      flex-direction: column;
      gap: calc(4px * var(--widget-zoom, 1.0));
      font-family: 'Courier New', Courier, monospace;
      font-size: calc(8px * var(--widget-zoom, 1.0));
      font-weight: 300;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.03);
      border: calc(1px * var(--widget-zoom, 1.0)) solid var(--glass-border);
      border-radius: calc(8px * var(--widget-zoom, 1.0));
      padding: calc(6px * var(--widget-zoom, 1.0)) calc(12px * var(--widget-zoom, 1.0));
      margin-top: calc(8px * var(--widget-zoom, 1.0));
      width: 100%;
      box-sizing: border-box;
      pointer-events: none;
    }
    .legend-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Range Sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .slider-value {
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      color: var(--text-secondary);
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      flex: 1;
      width: 100%;
      padding: 0;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      box-sizing: border-box;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent-primary);
      cursor: pointer;
      box-shadow: var(--glow-accent);
      transition: background 0.15s, transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: var(--text-primary);
      transform: scale(1.2);
    }

    /* Sub Settings Container Specific */
    .sub-settings-panel {
      border: 1px dashed var(--glass-border);
      background: rgba(255, 255, 255, 0.01);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    /* Ultimate Visibility Control Toggler */
    #btn-toggle-controls {
      position: fixed;
      bottom: 30px;
      right: 428px; /* Offset next to the panel */
      z-index: 40000 !important;
      opacity: var(--elevation-4-opacity);
      backdrop-filter: blur(var(--elevation-4-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--elevation-4-blur)) saturate(180%);
      background: var(--elevation-4-bg);
      border: var(--elevation-4-border);
      border-radius: 18px;
      color: var(--text-primary);
      padding: 14px 22px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--elevation-4-shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #btn-toggle-controls.controls-closed {
      right: 30px;
    }

    #btn-toggle-controls:hover {
      background: var(--accent-primary) !important;
      color: #0c0e14 !important;
      border-color: var(--accent-primary) !important;
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    #btn-toggle-controls:active {
      transform: translateY(1px);
    }

    /* Premium Glassmorphic Canva Instructions Card */
    .canva-instructions-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 550px;
      padding: 40px;
      background: var(--elevation-4-bg);
      backdrop-filter: blur(var(--elevation-4-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--elevation-4-blur)) saturate(180%);
      border: var(--elevation-4-border);
      border-radius: 28px;
      box-shadow: var(--elevation-4-shadow);
      box-sizing: border-box;
      text-align: left;
      font-family: 'Inter', sans-serif;
    }
    
    .canva-instructions-card h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.05em;
      margin-top: 0;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #00f0ff 0%, #7000ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      text-align: center;
    }
    
    .canva-instructions-card ol {
      margin: 0;
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .canva-instructions-card li {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
    }
    
    .canva-instructions-card li strong {
      color: #00f0ff;
      font-weight: 600;
    }
    
    /* Simulated Portrait Mode overrides */
    body.portrait-mode .canva-instructions-card {
      width: 90%;
      padding: 30px 20px;
    }
    body.portrait-mode .canva-instructions-card h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    body.portrait-mode .canva-instructions-card li {
      font-size: 12px;
      line-height: 1.5;
    }

    /* Ticker Tape Prime Styles */
    .ticker-panel {
      display: flex;
      align-items: center;
      overflow: hidden;
      width: 100%;
      height: calc(56px * var(--widget-zoom, 1.0));
      background: rgba(10, 12, 18, 0.7);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border: calc(1px * var(--widget-zoom, 1.0)) solid rgba(255, 255, 255, 0.08);
      border-radius: calc(12px * var(--widget-zoom, 1.0));
      box-sizing: border-box;
    }

    // ResizeObserver Registry & Routing Engine
    window._widgetResizeObservers = window._widgetResizeObservers || {};
    window.triggerWidgetResize = function(id) {
      const inst = widgetInstances.find(w => w.id === id);
      if (!inst || inst.plugin === 'none' || inst.plugin === '') return;
      const containerSelector = `#widget-container-${id}`;
      try {
        if (inst.plugin === 'clock' && window.WorldClockHUD) {
          window.WorldClockHUD.update(containerSelector);
        } else if (inst.plugin === 'weather' && window.WeatherHUD) {
          window.WeatherHUD.update(containerSelector);
        } else if (inst.plugin === 'news' && window.NewsHUD) {
          window.NewsHUD.update(containerSelector);
        } else if (inst.plugin === 'ticker-prime' && window.TickerPrime) {
          window.TickerPrime.update(containerSelector);
        } else if (inst.plugin === 'fx-pro-board' && window.FXProBoard) {
          window.FXProBoard.update(containerSelector);
        } else if (inst.plugin === 'fx-earth-globe' && window.FXEarthGlobe) {
          window.FXEarthGlobe.update(containerSelector);
          if (typeof window.FXEarthGlobe._drawFrame === 'function') {
            window.FXEarthGlobe._drawFrame(containerSelector);
          }
        } else if (inst.plugin === 'fx-logistics-transit' && window.LogisticsTransitHUD) {
          window.LogisticsTransitHUD.update(containerSelector);
          if (typeof window.LogisticsTransitHUD._drawFrame === 'function') {
            window.LogisticsTransitHUD._drawFrame(containerSelector);
          }
        } else if (inst.plugin === 'fx-financial-hub' && window.FinancialHubHUD) {
          window.FinancialHubHUD.update(containerSelector);
          if (typeof window.FinancialHubHUD._drawFrame === 'function') {
            window.FinancialHubHUD._drawFrame(containerSelector);
          }
        }
      } catch (e) {
        console.warn("Resize update failed for widget instance:", id, e);
      }
    };

    // DOM & Plugin Sync Cycle
    window.syncComposerWidgets = function() {
      const matrix = document.getElementById('layout-matrix');
      if (!matrix) return;

      // 1. Purge removed instances from DOM
      const existingWrappers = matrix.querySelectorAll('.spatial-composer-wrapper');
      existingWrappers.forEach(wrapper => {
        const id = wrapper.id.replace('spatial-composer-container-', '');
        const instExists = widgetInstances.some(w => w.id === id);
        if (!instExists) {
          const containerSelector = `#widget-container-${id}`;
          try {
            if (window._widgetResizeObservers[id]) {
              window._widgetResizeObservers[id].disconnect();
              delete window._widgetResizeObservers[id];
            }
            window.WorldClockHUD.destroy(containerSelector);
            window.WeatherHUD.destroy(containerSelector);
            if (window.NewsHUD) window.NewsHUD.destroy(containerSelector);
            if (window.TickerPrime) window.TickerPrime.destroy(containerSelector);
            if (window.FXProBoard) window.FXProBoard.destroy(containerSelector);
            if (window.FXEarthGlobe) window.FXEarthGlobe.destroy(containerSelector);
            if (window.LogisticsTransitHUD) window.LogisticsTransitHUD.destroy(containerSelector);
            if (window.FinancialHubHUD) window.FinancialHubHUD.destroy(containerSelector);
          } catch (e) {
            console.warn("Unmount failed during sync purge:", e);
          }
          wrapper.remove();
        }
      });

      // 2. Add / Update active instances
      widgetInstances.forEach(inst => {
        let wrapper = document.getElementById(`spatial-composer-container-${inst.id}`);
        let inner = document.getElementById(`widget-container-${inst.id}`);

        if (!wrapper) {
          wrapper = document.createElement('div');
          wrapper.id = `spatial-composer-container-${inst.id}`;
          wrapper.className = `spatial-composer-wrapper`;
          
          inner = document.createElement('div');
          inner.id = `widget-container-${inst.id}`;
          wrapper.appendChild(inner);
          matrix.appendChild(wrapper);
        }

        // Apply grid coordinates
        if (inst.occupiedZones && inst.occupiedZones.length > 0) {
          wrapper.style.display = '';
          const rows = inst.occupiedZones.map(z => Math.floor((z - 1) / 3) + 1);
          const cols = inst.occupiedZones.map(z => ((z - 1) % 3) + 1);
          const minRow = Math.min(...rows);
          const maxRow = Math.max(...rows);
          const minCol = Math.min(...cols);
          const maxCol = Math.max(...cols);
          wrapper.style.gridRow = `${minRow} / ${maxRow + 1}`;
          wrapper.style.gridColumn = `${minCol} / ${maxCol + 1}`;
        } else {
          wrapper.style.display = 'none';
        }

        // Apply visual classes and layers
        wrapper.className = `spatial-composer-wrapper fit-${inst.fitBehavior} align-${inst.alignment} elevation-level-1`;
        wrapper.style.zIndex = inst.zIndex;

        // Sync plugin lifecycle mounting
        const currentPlugin = inner.dataset.activePlugin;
        if (currentPlugin !== inst.plugin) {
          const containerSelector = `#widget-container-${inst.id}`;
          
          // Cleanup old mounts
          if (currentPlugin && currentPlugin !== 'none') {
            try {
              window.WorldClockHUD.destroy(containerSelector);
              window.WeatherHUD.destroy(containerSelector);
              if (window.NewsHUD) window.NewsHUD.destroy(containerSelector);
              if (window.TickerPrime) window.TickerPrime.destroy(containerSelector);
              if (window.FXProBoard) window.FXProBoard.destroy(containerSelector);
              if (window.FXEarthGlobe) window.FXEarthGlobe.destroy(containerSelector);
              if (window.LogisticsTransitHUD) window.LogisticsTransitHUD.destroy(containerSelector);
              if (window.FinancialHubHUD) window.FinancialHubHUD.destroy(containerSelector);
            } catch (e) {
              console.warn("Destroy failed on sync mount change:", e);
            }
          }

          inner.innerHTML = '';
          inner.dataset.activePlugin = inst.plugin;

          if (inst.plugin !== 'none' && inst.plugin !== '') {
            mountInitialWidgetPlugin(inst);
          }
          updateWidgetInstanceDOM(inst);
        } else {
          // Plugin is the same, simply sync live values
          updateWidgetInstanceDOM(inst);
        }

        // Setup ResizeObserver for this wrapper
        if (!window._widgetResizeObservers[inst.id]) {
          let debounceTimeout = null;
          const ro = new ResizeObserver((entries) => {
            if (debounceTimeout) clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => {
              requestAnimationFrame(() => {
                window.triggerWidgetResize(inst.id);
              });
            }, 120);
          });
          ro.observe(wrapper);
          window._widgetResizeObservers[inst.id] = ro;
        }
      });

      renderLiveJsonState();
    };

    window.updateWidgetInstanceDOM = function(inst) {
      const containerSelector = `#widget-container-${inst.id}`;
      const wrapper = document.getElementById(`spatial-composer-container-${inst.id}`);
      if (wrapper) {
        const opacity = inst.opacity !== undefined ? inst.opacity : 1.0;
        if (opacity === 0) {
          wrapper.style.setProperty('background', 'transparent', 'important');
          wrapper.style.setProperty('border-color', 'transparent', 'important');
          wrapper.style.setProperty('backdrop-filter', 'none', 'important');
          wrapper.style.setProperty('-webkit-backdrop-filter', 'none', 'important');
          wrapper.style.setProperty('box-shadow', 'none', 'important');
        } else {
          wrapper.style.setProperty('background', `rgba(20, 24, 32, ${opacity})`, 'important');
          wrapper.style.removeProperty('border-color');
          wrapper.style.removeProperty('backdrop-filter');
          wrapper.style.removeProperty('-webkit-backdrop-filter');
          wrapper.style.removeProperty('box-shadow');
        }

        // Scale & Transform Origin - Abandons transform: scale() to support fluid reflow
        const scale = inst.scale !== undefined ? inst.scale : 1.0;
        wrapper.style.setProperty('--widget-zoom', scale);
        wrapper.style.removeProperty('transform');
        wrapper.style.removeProperty('transform-origin');
      }

      const updateParams = {
        glassOpacity: inst.opacity,
        scale: inst.scale,
        customTitle: inst.customTitle,
        fitBehavior: inst.fitBehavior
      };

      if (inst.plugin === 'clock') {
        updateParams.displayType = inst.theme;
        updateParams.capitals = inst.capitals.slice(0, inst.clockCount);
        window.WorldClockHUD.update(containerSelector, updateParams);
      } else if (inst.plugin === 'weather') {
        updateParams.displayType = inst.theme;
        updateParams.cities = inst.cities;
        window.WeatherHUD.update(containerSelector, updateParams);
      } else if (inst.plugin === 'news') {
        updateParams.newsMode = inst.newsMode;
        updateParams.streams = inst.streams;
        window.NewsHUD.update(containerSelector, updateParams);
      } else if (inst.plugin === 'ticker-prime') {
        const containerEl = document.querySelector(containerSelector);
        if (containerEl) {
          containerEl.style.setProperty('--ticker-duration', `${inst.tickerSpeed}s`);
        }
        updateParams.tickerAssets = inst.tickerAssets;
        updateParams.tickerSpeed = inst.tickerSpeed;
        window.TickerPrime.update(containerSelector, updateParams);
      } else if (inst.plugin === 'fx-pro-board') {
        updateParams.fxBase = inst.fxBase;
        updateParams.fxMarkup = inst.fxMarkup;
        updateParams.fxTargets = inst.fxTargets;
        window.FXProBoard.update(containerSelector, updateParams);
      } else if (inst.plugin === 'fx-earth-globe') {
        updateParams.globeSpeed = inst.globeSpeed;
        updateParams.globeLights = inst.globeLights;
        updateParams.globeMode = inst.globeMode;
        updateParams.globeLat = inst.globeLat;
        updateParams.globeLng = inst.globeLng;
        updateParams.globeBeacon = inst.globeBeacon;
        updateParams.globeLayerClouds = inst.globeLayerClouds;
        updateParams.globeLayerPrecipitation = inst.globeLayerPrecipitation;
        updateParams.globeLayerLightning = inst.globeLayerLightning;
        updateParams.globeLayerVortex = inst.globeLayerVortex;
        updateParams.globeLayerTemperature = inst.globeLayerTemperature;
        updateParams.globeSweepSpeed = inst.globeSweepSpeed;
        updateParams.globeShowLegend = inst.globeShowLegend;
        window.FXEarthGlobe.update(containerSelector, updateParams);
      } else if (inst.plugin === 'fx-logistics-transit') {
        updateParams.transitSpeed = inst.transitSpeed;
        updateParams.screenLat = inst.screenLat;
        updateParams.screenLng = inst.screenLng;
        window.LogisticsTransitHUD.update(containerSelector, updateParams);
      } else if (inst.plugin === 'fx-financial-hub') {
        updateParams.vix = inst.financialVix;

    window.handleBackgroundChange = function(val) {
      const overlay = document.getElementById('cinema-overlay');
      const canvaContainer = document.getElementById('canva-background-container');
      const canvaSettings = document.getElementById('canva-settings-group');
      const embedLinkInput = document.getElementById('canva-embed-link');
      const videoGroup = document.getElementById('video-selector-group');
      const videoContainer = document.getElementById('bg-video-container');
      const videoSelector = document.getElementById('video-selector');

      if (videoSelector && val !== 'canva') {
        videoSelector.value = val;
      }

      if (val === 'canva') {
        document.body.classList.remove('blank-canvas-active');
        if (videoContainer) videoContainer.innerHTML = '';
        if (overlay) overlay.style.display = 'none';
        if (canvaContainer) canvaContainer.style.display = 'block';
        if (canvaSettings) canvaSettings.style.display = 'block';
        if (videoGroup) videoGroup.style.display = 'none';
        updateCanvaEmbed(embedLinkInput ? embedLinkInput.value : '');
      } else {
        if (canvaContainer) {
          canvaContainer.style.display = 'none';
          canvaContainer.innerHTML = '';
          canvaContainer.style.backgroundImage = 'none';
        }
        if (canvaSettings) canvaSettings.style.display = 'none';
        
        let asset = BACKDROP_ASSETS.find(a => a.id === val || a.url === val);
        let url = asset ? asset.url : val;

        if (url && val !== 'none') {
          document.body.classList.remove('blank-canvas-active');
          if (videoContainer) {
            videoContainer.innerHTML = `<video id="cinema-backdrop" autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>`;
            const backdrop = document.getElementById('cinema-backdrop');
            if (backdrop) {
              backdrop.src = url;
              backdrop.muted = true;
              backdrop.loop = true;
              backdrop.setAttribute('playsinline', '');
              backdrop.autoplay = true;
              backdrop.load();
              backdrop.play().catch(err => console.warn("Autoplay failed:", err));
            }
          }
          if (overlay) overlay.style.display = 'block';
          if (videoGroup) videoGroup.style.display = 'block';
        } else {
          document.body.classList.add('blank-canvas-active');
          if (videoContainer) {
            videoContainer.innerHTML = '';
          }
          if (overlay) overlay.style.display = 'none';
          if (videoGroup) videoGroup.style.display = 'block';
        }
      }
    };

                <li>Open your custom design or layout inside <strong>Canva.com</strong></li>
                <li>Click <strong>"Share"</strong> in the top-right corner, scroll down and select <strong>"More"</strong></li>
                <li>Click <strong>"Embed"</strong> and copy the second URL option <strong>("Smart Embed Link")</strong></li>
                <li>Paste your private link into the <strong>SignageHub Manager</strong> input box to sync live!</li>
              </ol>
            </div>
          `;
        } else {
          let previewUrl = '';
          if (currentPreset === 'morning_paper') {
            previewUrl = currentOrientation === 'portrait'
              ? 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779607200/the_morning_paper_portr%C3%A6t_fzp91w.png'
              : 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779607199/the_morning_paper_fuqq3z.png';
          } else {
            previewUrl = currentOrientation === 'portrait' 
              ? 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779594844/The_Editorial_Bistro_Menu_for_signagehub_portr%C3%A6t_iu1vjb.png'
              : 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779594846/The_Editorial_Bistro_Menu_for_signagehub_pokoii.png';
          }
          
          container.style.backgroundImage = `url('${previewUrl}')`;
          container.style.backgroundSize = 'cover';
          container.style.backgroundPosition = 'center';
          container.innerHTML = '';
        }
      } else {
        let finalUrl = url.trim();
        if (finalUrl.includes('canva.com/design/') && !finalUrl.includes('embed')) {
          finalUrl += finalUrl.includes('?') ? '&embed' : '?embed';
        }
        container.style.backgroundImage = 'none';
        container.innerHTML = `<iframe src="${finalUrl}" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>`;
      }
    };

    window.toggleOrientation = function(orientation) {
      const body = document.body;
      const videoSelector = document.getElementById('video-selector');
      const selectedVideoVal = videoSelector ? videoSelector.value : '';
      const presetSelector = document.getElementById('preset-selector');
      const canvaEditBtn = document.getElementById('canva-edit-btn');

      const isCanvaActive = presetSelector && (presetSelector.value === 'restaurant' || presetSelector.value === 'custom_canva' || presetSelector.value === 'morning_paper');

      if (orientation === 'portrait') {
        body.classList.add('portrait-mode');
        if (canvaEditBtn && presetSelector) {
          canvaEditBtn.href = presetSelector.value === 'morning_paper' ? 'https://canva.link/tf4mm0t58wdjznf' : 'https://canva.link/gk8q8x3iykc1oca';
        }
        if (videoSelector) {
          videoSelector.innerHTML = renderBackdropOptions(true);
          if (selectedVideoVal !== 'canva') videoSelector.value = selectedVideoVal;
        }
        if (presetSelector && presetSelector.value === 'restaurant') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          if (embedLinkInput) embedLinkInput.value = '';
          updateCanvaEmbed('');
        }
        if (isCanvaActive) {
          const embedLinkInput = document.getElementById('canva-embed-link');
          updateCanvaEmbed(embedLinkInput ? embedLinkInput.value : '');
        }

        widgetInstances.forEach(inst => {
          inst.scale = Math.min(inst.scale, 0.45);
          updateWidgetInstanceDOM(inst);
        });
        buildAdminControls();
      } else {
        body.classList.remove('portrait-mode');
        if (canvaEditBtn && presetSelector) {
          canvaEditBtn.href = presetSelector.value === 'morning_paper' ? 'https://canva.link/pz3aba64hnqyymv' : 'https://canva.link/qtdk4f6jz096vtm';
        }
        if (videoSelector) {
          videoSelector.innerHTML = renderBackdropOptions(false);
          if (selectedVideoVal !== 'canva') videoSelector.value = selectedVideoVal;
        }
        if (presetSelector && presetSelector.value === 'restaurant') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          if (embedLinkInput) {
            embedLinkInput.value = 'https://www.canva.com/design/DAGFc2-0P8A/view?embed';
            updateCanvaEmbed(embedLinkInput.value);
          }
        } else if (isCanvaActive) {
          const embedLinkInput = document.getElementById('canva-embed-link');
          updateCanvaEmbed(embedLinkInput ? embedLinkInput.value : '');
        }

        widgetInstances.forEach(inst => {
          inst.scale = 0.5;
          updateWidgetInstanceDOM(inst);
        });
        buildAdminControls();
      }
    };

    function setupDrawerToggler() {
      const btn = document.getElementById('btn-toggle-controls');
      const panel = document.getElementById('master-control-panel');
      if (!btn || !panel) return;
      btn.addEventListener('click', () => {
        const isHidden = panel.classList.toggle('drawer-hidden');
        if (isHidden) {
          btn.classList.add('controls-closed');
          btn.querySelector('.btn-text').textContent = 'SHOW MASTER PANEL';
        } else {
          btn.classList.remove('controls-closed');
          btn.querySelector('.btn-text').textContent = 'HIDE MASTER PANEL';
        }
      });
    }

    function setupVideoSelector() {
      const selector = document.getElementById('video-selector');
      if (!selector) return;
      selector.addEventListener('change', () => {
        handleBackgroundChange(selector.value);
      });
    }
  </script>
</body>
