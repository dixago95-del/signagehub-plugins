<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Global Shared Context Event Bus -->
  <script>
    window.SignageHubEventBus = new EventTarget();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignageHub Master Platform</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Global Reset & Base Styling */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030305;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      user-select: none;
    }

    /* Fixed Cinematic Underlay Backdrop */
    #cinema-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
    }

    /* Cinematic Overlay shading to enhance visibility */
    #cinema-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.6) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Canva Background Container & Crop styling */
    #canva-background-container {
      overflow: hidden;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      display: none;
    }
    #canva-background-container iframe {
      width: 100%;
      height: calc(100% + 50px);
      transform: scale(1.05);
      transform-origin: top center;
      border: none;
      pointer-events: none;
    }

    /* Screen Simulator Portrait Overrides */
    body.portrait-mode #cinema-backdrop,
    body.portrait-mode #cinema-overlay,
    body.portrait-mode #layout-matrix,
    body.portrait-mode #canva-background-container {
      width: calc(100vh * 9 / 16) !important;
      height: 100vh !important;
      left: 50% !important;
      right: auto !important;
      transform: translateX(-50%) !important;
    }

    /* Global 3x3 Layout Grid Matrix Layer */
    #layout-matrix {
      position: fixed;
      top: 0;
      left: 0;
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      grid-template-rows: repeat(3, minmax(0, 1fr)) !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-sizing: border-box;
      z-index: 10000;
      pointer-events: none; /* Ignore pointer events on grid itself */
    }

    /* Grid Slot Styling & Transform Origins for Edge Alignment */
    .matrix-slot {
      pointer-events: auto; /* Re-enable pointer events inside slots for interactive elements */
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 100% !important;
      height: 100% !important;
      position: relative !important; /* CRITICAL ANCHOR */
      overflow: visible !important;
    }

    /* Explicit Row/Column Matrix coordinates and alignments */
    .slot-1 {
      grid-row: 1;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top left;
    }
    .slot-2 {
      grid-row: 1;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top center;
    }
    .slot-3 {
      grid-row: 1;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      box-sizing: border-box;
      transform-origin: top right;
    }
    .slot-4 {
      grid-row: 2;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center left;
    }
    .slot-5 {
      grid-row: 2;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center center;
    }
    .slot-6 {
      grid-row: 2;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      box-sizing: border-box;
      transform-origin: center right;
    }
    .slot-7 {
      grid-row: 3;
      grid-column: 1;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom left;
    }
    .slot-8 {
      grid-row: 3;
      grid-column: 2;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom center;
    }
    .slot-9 {
      grid-row: 3;
      grid-column: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      box-sizing: border-box;
      transform-origin: bottom right;
    }

    /* 9-Slot Administrative Control Dashboard (Glassmorphic) */
    #master-control-panel {
      position: fixed;
      right: 24px;
      top: 24px;
      bottom: 24px;
      width: 380px;
      height: calc(100vh - 48px);
      z-index: 30000 !important;
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      background: rgba(10, 14, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Hidden Drawer State */
    #master-control-panel.drawer-hidden {
      transform: translateX(430px);
      opacity: 0;
    }

    /* Dashboard Header */
    .panel-header-block {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .panel-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.05em;
      margin: 0;
      background: linear-gradient(135deg, #00f0ff 0%, #7000ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .panel-subtitle {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Scrollable Slot Configuration Grid */
    .panel-body-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Custom Scrollbar */
    .panel-body-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .panel-body-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }
    .panel-body-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Accordion Control Blocks - Totally Unclipped */
    .slot-config-block {
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      overflow: visible; /* Ensure nothing is hidden or clipped */
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .slot-config-block.active-slot {
      border-color: rgba(0, 240, 255, 0.25);
      background: rgba(0, 240, 255, 0.02);
    }

    .slot-accordion-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.7);
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      transition: background 0.2s ease;
    }

    .slot-accordion-header:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #ffffff;
    }

    .slot-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.3s ease;
    }

    .active-slot .slot-status-dot {
      background: #00f0ff;
      box-shadow: 0 0 10px #00f0ff;
    }

    .slot-accordion-body {
      padding: 0 20px 20px 20px;
      display: none; /* Accordion state */
      flex-direction: column;
      gap: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 16px;
      overflow: visible; /* Ensure inner elements are unclipped */
    }

    .slot-config-block.open-block .slot-accordion-body {
      display: flex;
    }

    /* Control Inputs */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input[type="text"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }
    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    select optgroup, #preset-selector optgroup {
      background: #11141a; /* Matches our dark premium manager theme panel */
      color: #8a99ad;      /* Crisp, high-contrast subtle grey/blue for category text */
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 6px 10px;
    }
    select option, #preset-selector option {
      background: #1a1f2c; /* Ensures normal dropdown items contrast against headers */
      color: #ffffff;
    }

    /* Range Sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .slider-value {
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      color: rgba(255, 255, 255, 0.6);
      min-width: 40px;
      text-align: right;
    }

    input[type="range"] {
      flex: 1;
      width: 100%;
      padding: 0;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      box-sizing: border-box;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00f0ff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
      transition: background 0.15s, transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #ffffff;
      transform: scale(1.2);
    }

    /* Sub Settings Container Specific */
    .sub-settings-panel {
      border: 1px dashed rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.01);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    /* Ultimate Visibility Control Toggler */
    #btn-toggle-controls {
      position: fixed;
      bottom: 30px;
      right: 428px; /* Offset next to the panel */
      z-index: 40000 !important;
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      background: rgba(10, 14, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      color: #ffffff;
      padding: 14px 22px;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #btn-toggle-controls.controls-closed {
      right: 30px;
    }

    #btn-toggle-controls:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    #btn-toggle-controls:active {
      transform: translateY(1px);
    }

    /* Premium Glassmorphic Canva Instructions Card */
    .canva-instructions-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 550px;
      padding: 40px;
      background: rgba(10, 14, 24, 0.72);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
      box-sizing: border-box;
      text-align: left;
      font-family: 'Inter', sans-serif;
    }
    
    .canva-instructions-card h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.05em;
      margin-top: 0;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #00f0ff 0%, #7000ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      text-align: center;
    }
    
    .canva-instructions-card ol {
      margin: 0;
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .canva-instructions-card li {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
    }
    
    .canva-instructions-card li strong {
      color: #00f0ff;
      font-weight: 600;
    }
    
    /* Simulated Portrait Mode overrides */
    body.portrait-mode .canva-instructions-card {
      width: 90%;
      padding: 30px 20px;
    }
    body.portrait-mode .canva-instructions-card h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    body.portrait-mode .canva-instructions-card li {
      font-size: 12px;
      line-height: 1.5;
    }

    /* Ticker Tape Prime Styles */
    .ticker-panel {
      display: flex;
      align-items: center;
      overflow: hidden;
      width: 100%;
      height: 56px;
      background: rgba(10, 12, 18, 0.7);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-sizing: border-box;
    }
    .ticker-track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker-crawl var(--ticker-duration, 30s) linear infinite;
      will-change: transform;
    }
    .ticker-item {
      display: inline-flex;
      align-items: center;
      padding: 0 24px;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 14px;
      font-weight: bold;
    }
    .ticker-symbol {
      color: rgba(255, 255, 255, 0.6);
      margin-right: 8px;
    }
    .ticker-price {
      color: #ffffff;
      margin-right: 8px;
    }
    .ticker-change.up {
      color: #00ff66;
    }
    .ticker-change.down {
      color: #ff453a;
    }

    @keyframes ticker-crawl {
      0% {
        transform: translate3d(0, 0, 0);
      }
      100% {
        transform: translate3d(-50%, 0, 0);
      }
    }

    /* FX-Pro Exchange Board Styles */
    .fx-panel {
      display: flex;
      flex-direction: column;
      padding: 24px 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      box-sizing: border-box;
      width: 600px;
      margin: 0 auto;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .fx-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      box-sizing: border-box;
    }
    .fx-table th {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 12px;
      text-align: right;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .fx-table th:first-child {
      text-align: left;
    }
    .fx-table td {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .fx-table td:first-child {
      text-align: left;
      font-weight: 700;
    }
    .fx-currency-code {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .fx-currency-flag {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      text-align: center;
      line-height: 18px;
      font-size: 10px;
    }
    .fx-rate-num {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }
    .fx-rate-num.buy {
      color: #00ff66;
    }
    .fx-rate-num.sell {
      color: #00f0ff;
    }
    .fx-trend-val {
      font-size: 12px;
      font-weight: 700;
    }
    .fx-trend-val.up {
      color: #00ff66;
    }
    .fx-trend-val.down {
      color: #ff453a;
    }
  </style>
</head>
<body>

  <!-- Fixed Luxury Backdrop Cinematic Video Loop -->
  <video id="cinema-backdrop" autoplay muted loop playsinline>
    <source src="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Cinematic Shade Layer -->
  <div id="cinema-overlay"></div>

  <!-- Canva Background Container -->
  <div id="canva-background-container"></div>

  <!-- The Global 3x3 Coordinate Matrix Grid -->
  <div id="layout-matrix">
    <div class="matrix-slot slot-1" id="grid-slot-1"></div>
    <div class="matrix-slot slot-2" id="grid-slot-2"></div>
    <div class="matrix-slot slot-3" id="grid-slot-3"></div>
    <div class="matrix-slot slot-4" id="grid-slot-4"></div>
    <div class="matrix-slot slot-5" id="grid-slot-5"></div>
    <div class="matrix-slot slot-6" id="grid-slot-6"></div>
    <div class="matrix-slot slot-7" id="grid-slot-7"></div>
    <div class="matrix-slot slot-8" id="grid-slot-8"></div>
    <div class="matrix-slot slot-9" id="grid-slot-9"></div>
  </div>

  <!-- Visibility Control Button -->
  <button id="btn-toggle-controls">
    <span class="eye-icon">👁️</span>
    <span class="btn-text">SHOW/HIDE MASTER PANEL</span>
  </button>

  <!-- Master Administrative Panel -->
  <div id="master-control-panel">
    <div class="panel-header-block">
      <h1 class="panel-title">SignageHub Manager</h1>
      <div class="panel-subtitle">Modular Layout Engine</div>

      <!-- Row 1: Screen Orientation & Environment Preset -->
      <div style="display: flex; gap: 12px; margin-top: 12px;">
        <div class="control-group" style="flex: 1;">
          <label class="control-label">SCREEN ORIENTATION</label>
          <select id="orientation-selector" onchange="toggleOrientation(this.value)">
            <option value="landscape">↔️ Landscape (16:9)</option>
            <option value="portrait">↕️ Portrait (9:16)</option>
          </select>
        </div>
        <div class="control-group" style="flex: 1;">
          <label class="control-label">ENVIRONMENT PRESET</label>
          <select id="preset-selector" onchange="applyPreset(this.value)">
            <option value="blank">Blank Canvas (Default)</option>
            <optgroup label="🍷 Food & Beverage">
              <option value="restaurant">🍴 Bistro menu 1</option>
              <option value="morning_paper">📰 The Morning Paper</option>
            </optgroup>
            <optgroup label="🎨 Custom Creations">
              <option value="custom_canva">🎨 Make your own template</option>
            </optgroup>
            <optgroup label="🏢 Corporate & Hospitality">
              <option value="executive">💼 Executive Global</option>
              <option value="hotel">🏨 Luxury Hotel</option>
              <option value="scandinavian">🇩🇰 Minimal Scandinavian</option>
            </optgroup>
          </select>
        </div>
      </div>
      
      <!-- Row 2: Select Backdrop Environment -->
      <div class="control-group" id="video-selector-group" style="margin-top: 12px;">
        <label class="control-label">Select Backdrop Environment</label>
        <select id="video-selector">
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4">Luxury Hotel Lounge</option>
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4">Fine Dining Restaurant</option>
        </select>
      </div>

      <!-- Row 3: Canva Settings Group (Initially Hidden, Inline compact placement) -->
      <div id="canva-settings-group" style="display: none; margin-top: 12px;">
        <div style="display: flex; gap: 10px; align-items: flex-end;">
          <div class="control-group" style="flex: 1;">
            <label class="control-label">Canva Smart Embed Link</label>

    // Global Widget Controls visibility toggler

      const clockPanel = document.getElementById(`clock-controls-${slotId}`);

      const fxPanel = document.getElementById(`fx-controls-${slotId}`);
      const globePanel = document.getElementById(`globe-controls-${slotId}`);

      if (clockPanel) clockPanel.style.display = 'none';
      if (weatherPanel) weatherPanel.style.display = 'none';
      if (newsPanel) newsPanel.style.display = 'none';
      if (tickerPanel) tickerPanel.style.display = 'none';
      if (fxPanel) fxPanel.style.display = 'none';
      if (globePanel) globePanel.style.display = 'none';

      if ((val === 'world-clock' || val === 'clock') && clockPanel) clockPanel.style.display = 'flex';
      if (val === 'weather' && weatherPanel) weatherPanel.style.display = 'flex';
      if (val === 'news' && newsPanel) newsPanel.style.display = 'flex';
      if (val === 'ticker-prime' && tickerPanel) tickerPanel.style.display = 'flex';
      if (val === 'fx-pro-board' && fxPanel) fxPanel.style.display = 'flex';
      if (val === 'fx-earth-globe' && globePanel) globePanel.style.display = 'flex';

    window.handleTickerSpeedChange = function(slotId, val) {
      const valueSpan = document.getElementById(`ticker-speed-val-${slotId}`);
      if (valueSpan) {
        valueSpan.textContent = `${val}s`;
      }
      slotConfigurations[slotId].tickerSpeed = parseInt(val, 10);
      updateSlotInstance(slotId);
    };

    window.handleFxMarkupChange = function(slotId, val) {
      const valueSpan = document.getElementById(`fx-markup-val-${slotId}`);
      if (valueSpan) {
        valueSpan.textContent = `${parseFloat(val).toFixed(1)}%`;
      }
      slotConfigurations[slotId].fxMarkup = parseFloat(val);
      updateSlotInstance(slotId);
    };

    window.handleFxTargetsChange = function(slotId, val) {
      slotConfigurations[slotId].fxTargets = val;
      updateSlotInstance(slotId);
    };

    window.handleGlobeSpeedChange = function(slotId, val) {
      const valueSpan = document.getElementById(`globe-speed-val-${slotId}`);
      if (valueSpan) {
        valueSpan.textContent = parseFloat(val).toFixed(2);
      }
      slotConfigurations[slotId].globeSpeed = parseFloat(val);
      updateSlotInstance(slotId);
    };

    window.handleGlobeLightsChange = function(slotId, checked) {
      slotConfigurations[slotId].globeLights = checked;
      updateSlotInstance(slotId);
    };

    window.handleGlobeModeChange = function(slotId, val) {
      slotConfigurations[slotId].globeMode = val;
      updateSlotInstance(slotId);
    };

    window.handleGlobeLatChange = function(slotId, val) {
      let lat = parseFloat(val);
      if (isNaN(lat)) lat = 0;
      lat = Math.max(-90, Math.min(90, lat));
      slotConfigurations[slotId].globeLat = lat;
      updateSlotInstance(slotId);
    };

    window.handleGlobeLngChange = function(slotId, val) {
      let lng = parseFloat(val);
      if (isNaN(lng)) lng = 0;
      lng = Math.max(-180, Math.min(180, lng));
      slotConfigurations[slotId].globeLng = lng;
      updateSlotInstance(slotId);
    };

    window.handleGlobeBeaconChange = function(slotId, checked) {
      slotConfigurations[slotId].globeBeacon = checked;
      updateSlotInstance(slotId);
    };

    window.autoDetectGlobeLocation = function(slotId) {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const lat = parseFloat(position.coords.latitude.toFixed(4));
            const lng = parseFloat(position.coords.longitude.toFixed(4));
            
            // Save to configuration
            slotConfigurations[slotId].globeLat = lat;
            slotConfigurations[slotId].globeLng = lng;
            
            // Update UI inputs if they exist
            const latInput = document.getElementById(`globe-lat-${slotId}`);
            if (latInput) latInput.value = lat;
            const lngInput = document.getElementById(`globe-lng-${slotId}`);
            if (lngInput) lngInput.value = lng;
            
            // Update widget instance
            updateSlotInstance(slotId);
          },
          function(error) {
            console.warn("Geolocation permission or retrieval failed. Sticking with default coordinates.", error);
          },
          { timeout: 5000, enableHighAccuracy: false }
        );
      }
    };

      const allBlocks = document.querySelectorAll('.slot-config-block');
      const targetBlock = document.querySelector(`.slot-block-${slotId}`);
      
      if (targetBlock) {
        const wasOpen = targetBlock.classList.contains('open-block');
        
        allBlocks.forEach(block => {
          block.classList.remove('open-block');
        });
        
        if (!wasOpen) {
          targetBlock.classList.add('open-block');
        }
      }
    };

    // Populate theme dropdown values depending on active plugin
    function populateThemes(slotId, pluginType, selectedValue) {
      const select = document.getElementById(`theme-select-${slotId}`);
      if (!select) return;
      
      select.innerHTML = '';
      const list = pluginType === 'clock' ? clockThemes : weatherThemes;
      
      list.forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.value;
        opt.textContent = item.label;
        if (item.value === selectedValue) opt.selected = true;
        select.appendChild(opt);
      });
    }

    // Handle Plugin Dropdown Changes
    window.handlePluginChange = function(slotId, isInitialLoad = false) {
      const select = document.getElementById(`plugin-select-${slotId}`);
      const type = select.value;
      const config = slotConfigurations[slotId];
      const block = document.querySelector(`.slot-block-${slotId}`);
      
      if (!isInitialLoad) {
        // Clean up previous mounts strictly targeting target grid class
        window.WorldClockHUD.unmount(`.slot-${slotId}`);
        window.WeatherHUD.unmount(`.slot-${slotId}`);
        if (window.NewsHUD) {
          window.NewsHUD.unmount(`.slot-${slotId}`);
        }
        if (window.TickerPrime) {
          window.TickerPrime.unmount(`.slot-${slotId}`);
        }
        if (window.FXProBoard) {
          window.FXProBoard.unmount(`.slot-${slotId}`);
        }
        if (window.FXEarthGlobe) {
          window.FXEarthGlobe.unmount(`.slot-${slotId}`);
        }
        window.WorldClockHUD.destroy(`.slot-${slotId}`);
        window.WeatherHUD.destroy(`.slot-${slotId}`);
        if (window.NewsHUD) {
          window.NewsHUD.destroy(`.slot-${slotId}`);
        }
        if (window.TickerPrime) {
          window.TickerPrime.destroy(`.slot-${slotId}`);
        }
        if (window.FXProBoard) {
          window.FXProBoard.destroy(`.slot-${slotId}`);
        }
        if (window.FXEarthGlobe) {
          window.FXEarthGlobe.destroy(`.slot-${slotId}`);
        }
        
        const targetGridElement = document.querySelector(`.slot-${slotId}`);
        if (targetGridElement) {
          targetGridElement.innerHTML = '';
        }
      }

      config.plugin = type;

      // Toggle display of static sub-panels
      window.handleWidgetSelection(slotId, type);

      if (type === 'none') {
        block.classList.remove('active-slot');
        document.getElementById(`theme-group-${slotId}`).style.display = 'none';
        document.getElementById(`opacity-group-${slotId}`).style.display = 'none';
        document.getElementById(`scale-group-${slotId}`).style.display = 'none';
      } else {
        block.classList.add('active-slot');
        if (type === 'news' || type === 'ticker-prime' || type === 'fx-pro-board' || type === 'fx-earth-globe') {
          document.getElementById(`theme-group-${slotId}`).style.display = 'none';
        } else {
          document.getElementById(`theme-group-${slotId}`).style.display = 'flex';
        }
        document.getElementById(`opacity-group-${slotId}`).style.display = 'flex';
        document.getElementById(`scale-group-${slotId}`).style.display = 'flex';
        
        // Dynamically trigger the build of child cities/streams if necessary
        if (type === 'clock') {
          handleClockCountChange(slotId, true);
        } else if (type === 'weather') {
          handleWeatherCountChange(slotId, true);
        } else if (type === 'news') {
          handleNewsCountChange(slotId, true);
        }
        
        if (type !== 'news' && type !== 'ticker-prime' && type !== 'fx-pro-board' && type !== 'fx-earth-globe') {
          // Set default theme for plugin
          if (!config.theme) {
            config.theme = type === 'clock' ? 'digital' : 'standard';
          }
          populateThemes(slotId, type, config.theme);
        }
        
        if (type === 'fx-earth-globe' && !isInitialLoad) {
          window.autoDetectGlobeLocation(slotId);
        }
        
        if (!isInitialLoad) {
          syncSlotPlugin(slotId);
        }
      }
    };

    // Build the Clock cities sub dropdown items
    window.handleClockCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`clock-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const citiesContainer = document.getElementById(`clock-cities-container-${slotId}`);
      if (!citiesContainer) return;

      citiesContainer.innerHTML = '';

      const availableCapitals = Object.keys(window.WorldClockHUD._capitalTimezones);
      // Premium selection fallbacks to prevent identical starting selections
      const defaultCapitals = ['Copenhagen', 'Tokyo', 'New York', 'London', 'Singapore', 'Sydney', 'Los Angeles', 'Dubai', 'Paris', 'Berlin'];

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        group.innerHTML = `
          <label class="control-label">Clock ${c}</label>
          <select id="clock-city-${slotId}-${c}" onchange="updateSlotInstance(${slotId})">
            ${availableCapitals.map(cap => {
              const label = cap === 'LOCAL' ? '📍 Current Location (LOCAL)' : cap;
              return `<option value="${cap}" ${cap === defaultCapitals[(c - 1) % defaultCapitals.length] ? 'selected' : ''}>${label}</option>`;
            }).join('')}
          </select>
        `;
        citiesContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    // Build the Weather regional optgroups sub dropdown items
    window.handleWeatherCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`weather-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const citiesContainer = document.getElementById(`weather-cities-container-${slotId}`);
      if (!citiesContainer) return;

      citiesContainer.innerHTML = '';

      // Build optgroup HTML dynamically based on regions
      const regionsMap = {};
      window.WeatherHUD.cityDatabase.forEach(city => {
        if (!regionsMap[city.region]) regionsMap[city.region] = [];
        regionsMap[city.region].push(city.name);
      });

      let optGroupsHtml = `<option value="LOCAL">📍 Current Location (LOCAL)</option>`;
      for (const region in regionsMap) {
        optGroupsHtml += `<optgroup label="${region}">`;
        regionsMap[region].forEach(cityName => {
          optGroupsHtml += `<option value="${cityName}">${cityName}</option>`;
        });
        optGroupsHtml += `</optgroup>`;
      }

      // Default city selector mappings to prevent overlaps
      const defaultCities = ['LOCAL', 'Copenhagen', 'New York', 'Tokyo', 'London', 'Paris', 'Sydney', 'Cairo', 'Singapore'];

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        
        // Match default selections if possible
        const defaultChoice = defaultCities[(c - 1) % defaultCities.length];
        
        let tempHtml = optGroupsHtml;
        if (defaultChoice !== 'LOCAL') {
          // Add selected trigger to option tag
          tempHtml = tempHtml.replace(`value="${defaultChoice}"`, `value="${defaultChoice}" selected`);
        } else {
          tempHtml = tempHtml.replace(`value="LOCAL"`, `value="LOCAL" selected`);
        }

        group.innerHTML = `
          <label class="control-label">City ${c}</label>
          <select id="weather-city-${slotId}-${c}" onchange="updateSlotInstance(${slotId})">
            ${tempHtml}
          </select>
        `;
        citiesContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    // Handle Custom Title Input changes
    window.handleCustomTitleChange = function(slotId, val) {
      slotConfigurations[slotId].customTitle = val;
      updateSlotInstance(slotId);
    };

    // Handle News Mode Dropdown changes
    window.handleNewsModeChange = function(slotId) {
      const select = document.getElementById(`news-mode-${slotId}`);
      if (select) {
        slotConfigurations[slotId].newsMode = select.value;
        updateSlotInstance(slotId);
      }
    };

    // Handle News Count Dropdown changes
    window.handleNewsCountChange = function(slotId, isInitialDraw = false) {
      const selectCount = document.getElementById(`news-count-${slotId}`);
      if (!selectCount) return;
      const count = parseInt(selectCount.value, 10);
      const streamsContainer = document.getElementById(`news-streams-container-${slotId}`);
      if (!streamsContainer) return;

      streamsContainer.innerHTML = '';

      const availableStreams = [
        { value: 'global', label: '🌍 Global' },
        { value: 'europe', label: '🇪🇺 Europe' },
        { value: 'usa', label: '🇺🇸 USA' },
        { value: 'asia', label: '🌏 Asia' },
        { value: 'nordic', label: '🇩🇰 Denmark & Nordics' },
        { value: 'finance', label: '💼 Finance & Markets' },
        { value: 'tech', label: '💻 Technology & AI' }
      ];

      const config = slotConfigurations[slotId];
      if (!config.streams) {
        config.streams = ['global', 'europe', 'finance'];
      }

      while (config.streams.length < count) {
        const nextDefault = availableStreams[config.streams.length % availableStreams.length].value;
        config.streams.push(nextDefault);
      }
      if (config.streams.length > count) {
        config.streams = config.streams.slice(0, count);
      }

      for (let c = 1; c <= count; c++) {
        const group = document.createElement('div');
        group.className = 'control-group';
        group.innerHTML = `
          <label class="control-label">News Stream ${c}</label>
          <select id="news-stream-${slotId}-${c}" onchange="handleNewsStreamChange(${slotId}, ${c - 1})">
            ${availableStreams.map(st => `<option value="${st.value}" ${st.value === config.streams[c - 1] ? 'selected' : ''}>${st.label}</option>`).join('')}
          </select>
        `;
        streamsContainer.appendChild(group);
      }

      if (!isInitialDraw) {
        syncSlotPlugin(slotId);
      }
    };

    // Handle Individual News Stream Selector changes
    window.handleNewsStreamChange = function(slotId, index) {
      const select = document.getElementById(`news-stream-${slotId}-${index + 1}`);
      if (select) {
        slotConfigurations[slotId].streams[index] = select.value;
        updateSlotInstance(slotId);
      }
    };

    // Handle theme dropdown selection changes
    window.handleThemeChange = function(slotId) {
      const select = document.getElementById(`theme-select-${slotId}`);
      const val = select.value;
      slotConfigurations[slotId].theme = val;
      
      updateSlotInstance(slotId);
    };

    // Handle Opacity Slider Dragging
    window.handleOpacityChange = function(slotId, val) {
      const valueSpan = document.getElementById(`opacity-val-${slotId}`);
      valueSpan.textContent = `${Math.round(val * 100)}%`;
      slotConfigurations[slotId].opacity = parseFloat(val);
      
      updateSlotInstance(slotId);
    };

    // Handle Scale Slider Dragging
    window.handleScaleChange = function(slotId, val) {
      const valueSpan = document.getElementById(`scale-val-${slotId}`);
      valueSpan.textContent = `${parseFloat(val).toFixed(2)}x`;
      slotConfigurations[slotId].scale = parseFloat(val);
      
      updateSlotInstance(slotId);
    };

    // Call update lifecycle inside plugin instance
    window.updateSlotInstance = function(slotId) {
      const config = slotConfigurations[slotId];
      const targetContainer = `.slot-${slotId}`;
      
      let customCities = null;

      if (config.plugin === 'clock') {
        const countSelect = document.getElementById(`clock-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`clock-city-${slotId}-${c}`);
            if (citySelect) {
              customCities.push(citySelect.value);
            }
          }
        }
      } else if (config.plugin === 'weather') {
        const countSelect = document.getElementById(`weather-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          customCities = [];
          for (let c = 1; c <= count; c++) {
            const citySelect = document.getElementById(`weather-city-${slotId}-${c}`);
            if (citySelect) {
              const cityName = citySelect.value;
              if (cityName === 'LOCAL') {
                customCities.push({ name: 'LOCAL', lat: 'LOCAL', lon: 'LOCAL' });
              } else {
                const cityObj = window.WeatherHUD.cityDatabase.find(x => x.name === cityName);
                if (cityObj) {
                  customCities.push({ name: cityObj.name, lat: cityObj.lat, lon: cityObj.lon });
                } else {
                  customCities.push({ name: cityName, lat: 55.6761, lon: 12.5683 });
                }
              }
            }
          }
        }
      }

      const updateParams = {};
      if (config.plugin === 'news') {
        const countSelect = document.getElementById(`news-count-${slotId}`);
        if (countSelect) {
          const count = parseInt(countSelect.value, 10);
          config.streams = [];
          for (let c = 1; c <= count; c++) {
            const streamSelect = document.getElementById(`news-stream-${slotId}-${c}`);
            if (streamSelect) {
              config.streams.push(streamSelect.value);
            }
          }
        }
        updateParams.newsMode = config.newsMode || 'ticker';
        updateParams.glassOpacity = config.opacity;
        updateParams.scale = config.scale;
        updateParams.streams = config.streams || ['global', 'europe', 'finance'];
      } else if (config.plugin === 'ticker-prime') {
        const assetsSelect = document.getElementById(`ticker-assets-${slotId}`);
        if (assetsSelect) {
          config.tickerAssets = assetsSelect.value;
        }
        const speedInput = document.getElementById(`ticker-speed-${slotId}`);
        if (speedInput) {
          config.tickerSpeed = parseInt(speedInput.value, 10);
        }
        
        // Update --ticker-duration on the slot container
        const slotEl = document.querySelector(targetContainer);
        if (slotEl) {
          slotEl.style.setProperty('--ticker-duration', `${config.tickerSpeed || 30}s`);
        }
        
        updateParams.tickerAssets = config.tickerAssets;
        updateParams.tickerSpeed = config.tickerSpeed;
        updateParams.glassOpacity = config.opacity;
        updateParams.scale = config.scale;
      } else if (config.plugin === 'fx-pro-board') {
        const baseInput = document.getElementById(`fx-base-currency-${slotId}`);
        if (baseInput) {
          config.fxBase = baseInput.value.trim().toUpperCase();
        }
        const markupInput = document.getElementById(`fx-markup-${slotId}`);
        if (markupInput) {
          config.fxMarkup = parseFloat(markupInput.value);
        }
        const targetsInput = document.getElementById(`fx-targets-${slotId}`);
        if (targetsInput) {
          config.fxTargets = targetsInput.value;
        }
        
        updateParams.fxBase = config.fxBase;
        updateParams.fxMarkup = config.fxMarkup;
        updateParams.fxTargets = config.fxTargets;
        updateParams.glassOpacity = config.opacity;
        updateParams.scale = config.scale;
      } else if (config.plugin === 'fx-earth-globe') {
        const speedInput = document.getElementById(`globe-speed-${slotId}`);
        if (speedInput) {
          config.globeSpeed = parseFloat(speedInput.value);
        }
        const lightsInput = document.getElementById(`globe-lights-${slotId}`);
        if (lightsInput) {
          config.globeLights = lightsInput.checked;
        }
        const modeInput = document.getElementById(`globe-mode-${slotId}`);
        if (modeInput) {
          config.globeMode = modeInput.value;
        }
        const latInput = document.getElementById(`globe-lat-${slotId}`);
        if (latInput) {
          config.globeLat = parseFloat(latInput.value) || 0;
        }
        const lngInput = document.getElementById(`globe-lng-${slotId}`);
        if (lngInput) {
          config.globeLng = parseFloat(lngInput.value) || 0;
        }
        const beaconInput = document.getElementById(`globe-beacon-${slotId}`);
        if (beaconInput) {
          config.globeBeacon = beaconInput.checked;
        }
        updateParams.globeSpeed = config.globeSpeed;
        updateParams.globeLights = config.globeLights;
        updateParams.globeMode = config.globeMode;
        updateParams.globeLat = config.globeLat;
        updateParams.globeLng = config.globeLng;
        updateParams.globeBeacon = config.globeBeacon;
        updateParams.glassOpacity = config.opacity;
        updateParams.scale = config.scale;
      } else {
        updateParams.displayType = config.theme;
        updateParams.glassOpacity = config.opacity;
        updateParams.scale = config.scale;
      }

      if (config.customTitle !== undefined) {
        updateParams.customTitle = config.customTitle;
      }

      if (customCities) {
        if (config.plugin === 'clock') {
          updateParams.capitals = customCities;
        } else {
          updateParams.cities = customCities;
        }
      }

      if (config.plugin === 'clock') {
        window.WorldClockHUD.update(targetContainer, updateParams);
      } else if (config.plugin === 'weather') {
        window.WeatherHUD.update(targetContainer, updateParams);
      } else if (config.plugin === 'news') {
        window.NewsHUD.update(targetContainer, updateParams);
      } else if (config.plugin === 'ticker-prime') {
        window.TickerPrime.update(targetContainer, updateParams);
      } else if (config.plugin === 'fx-pro-board') {
        window.FXProBoard.update(targetContainer, updateParams);
      } else if (config.plugin === 'fx-earth-globe') {
        window.FXEarthGlobe.update(targetContainer, updateParams);
      }
    };

    // Environment Presets Change Handler
    window.applyPreset = function(presetName) {
      // First, unmount and destroy all existing widgets to start fresh
      for (let i = 1; i <= 9; i++) {
        window.WorldClockHUD.unmount(`.slot-${i}`);
        window.WeatherHUD.unmount(`.slot-${i}`);
        if (window.NewsHUD) {
          window.NewsHUD.unmount(`.slot-${i}`);
        }
        if (window.TickerPrime) {
          window.TickerPrime.unmount(`.slot-${i}`);
        }
        if (window.FXProBoard) {
          window.FXProBoard.unmount(`.slot-${i}`);
        }
        if (window.FXEarthGlobe) {
          window.FXEarthGlobe.unmount(`.slot-${i}`);
        }
        window.WorldClockHUD.destroy(`.slot-${i}`);
        window.WeatherHUD.destroy(`.slot-${i}`);
        if (window.NewsHUD) {
          window.NewsHUD.destroy(`.slot-${i}`);
        }
        if (window.TickerPrime) {
          window.TickerPrime.destroy(`.slot-${i}`);
        }
        if (window.FXProBoard) {
          window.FXProBoard.destroy(`.slot-${i}`);
        }
        if (window.FXEarthGlobe) {
          window.FXEarthGlobe.destroy(`.slot-${i}`);
        }
        const targetGridElement = document.querySelector(`.slot-${i}`);
        if (targetGridElement) {
          targetGridElement.innerHTML = '';
        }
        
        // Reset config
        slotConfigurations[i] = {
          plugin: 'none',
          theme: '',
          opacity: 0.8,
          scale: 1.0,
          customTitle: undefined,
          newsMode: 'ticker',
          streams: ['global', 'europe', 'finance'],
          tickerSpeed: 30,
          tickerAssets: 'stocks',
          fxBase: 'EUR',
          fxMarkup: 0.0,
          fxTargets: 'USD,EUR,GBP,JPY,CHF,CAD',
          globeSpeed: 0.5,
          globeLights: true,
          globeMode: 'illustrative',
          globeLat: 55.6761,
          globeLng: 12.5683,
          globeBeacon: true
        };
      }

      const backdrop = document.getElementById('cinema-backdrop');
      const videoSelector = document.getElementById('video-selector');

      if (presetName === 'executive') {
        const videoUrl = 'https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4';
        backdrop.src = videoUrl;
        backdrop.load();
        backdrop.play().catch(e => {});
        videoSelector.value = videoUrl;
        handleBackgroundChange(videoUrl);

        // Corporate Blueprint: Clock in Slot 2, Weather in Slot 8, pre-scaled to 50%, opacities at 80%
        slotConfigurations[2] = {
          plugin: 'clock',
          theme: 'analog',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined
        };
        slotConfigurations[8] = {
          plugin: 'weather',
          theme: 'ambient',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined
        };
      } else if (presetName === 'hotel') {
        const videoUrl = 'https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4';
        backdrop.src = videoUrl;
        backdrop.load();
        backdrop.play().catch(e => {});
        videoSelector.value = videoUrl;
        handleBackgroundChange(videoUrl);

        // Hospitality Preset: Weather in zone (slot 8), News HUD in zone (slot 2) running in Editorial mode pre-scaled to 50%
        slotConfigurations[8] = {
          plugin: 'weather',
          theme: 'ambient',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined
        };
        slotConfigurations[2] = {
          plugin: 'news',
          newsMode: 'editorial',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined,
          streams: ['global', 'europe', 'finance']
        };
      } else if (presetName === 'scandinavian') {
        const videoUrl = 'https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4';
        backdrop.src = videoUrl;
        backdrop.load();
        backdrop.play().catch(e => {});
        videoSelector.value = videoUrl;
        handleBackgroundChange(videoUrl);

        // Minimal Scandinavian Setup: Clock on Slot 1, Weather on Slot 3, 50% scale
        slotConfigurations[1] = {
          plugin: 'clock',
          theme: 'digital',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined
        };
        slotConfigurations[3] = {
          plugin: 'weather',
          theme: 'zen',
          opacity: 0.8,
          scale: 0.5,
          customTitle: undefined
        };
      } else if (presetName === 'restaurant') {
        const orientationSelector = document.getElementById('orientation-selector');
        const isLandscape = orientationSelector.value === 'landscape';

        // Set backdrop selector to Canva Layout Board
        handleBackgroundChange('canva');

        // Update Edit button link
        const canvaEditBtn = document.getElementById('canva-edit-btn');
        if (canvaEditBtn) {
          canvaEditBtn.href = isLandscape 
            ? 'https://canva.link/qtdk4f6jz096vtm' 
            : 'https://canva.link/gk8q8x3iykc1oca';
        }

        // Pre-populate input link if Landscape is active
        const embedLinkInput = document.getElementById('canva-embed-link');
        if (isLandscape) {
          embedLinkInput.value = 'https://www.canva.com/design/DAGFc2-0P8A/view?embed'; // Master embed link for "The Editorial Bistro Menu"
        } else {
          embedLinkInput.value = '';
        }
        updateCanvaEmbed(embedLinkInput.value);
      } else if (presetName === 'custom_canva') {
        const orientationSelector = document.getElementById('orientation-selector');
        const isLandscape = orientationSelector.value === 'landscape';

        // Set backdrop selector to Canva Layout Board
        handleBackgroundChange('canva');

        // Update Edit button link
        const canvaEditBtn = document.getElementById('canva-edit-btn');
        if (canvaEditBtn) {
          canvaEditBtn.href = isLandscape 
            ? 'https://canva.link/qtdk4f6jz096vtm' 
            : 'https://canva.link/gk8q8x3iykc1oca';
        }

        // Clear Canva input link to prompt instructions card
        const embedLinkInput = document.getElementById('canva-embed-link');
        embedLinkInput.value = '';
        updateCanvaEmbed('');
      } else if (presetName === 'morning_paper') {
        const orientationSelector = document.getElementById('orientation-selector');
        const isLandscape = orientationSelector.value === 'landscape';

        // Set backdrop selector to Canva Layout Board
        handleBackgroundChange('canva');

        // Update Edit button link
        const canvaEditBtn = document.getElementById('canva-edit-btn');
        if (canvaEditBtn) {
          canvaEditBtn.href = isLandscape 
            ? 'https://canva.link/pz3aba64hnqyymv' 
            : 'https://canva.link/tf4mm0t58wdjznf';
        }

        // Clear Canva input link to prompt instructions/preview fallback
        const embedLinkInput = document.getElementById('canva-embed-link');
        embedLinkInput.value = '';
        updateCanvaEmbed('');
      } else {
        // Blank Canvas (default video is Luxury Hotel Lounge)
        const videoUrl = 'https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4';
        backdrop.src = videoUrl;
        backdrop.load();
        backdrop.play().catch(e => {});
        videoSelector.value = videoUrl;
        handleBackgroundChange(videoUrl);
      }

      // Re-render UI controls
      buildAdminControls();

      // Trigger initialization of active plugins
      for (let i = 1; i <= 9; i++) {
        const config = slotConfigurations[i];
        if (config.plugin !== 'none') {
          handlePluginChange(i, true);
          syncSlotPlugin(i);
        }
      }
    };

    // Custom background and Canva switcher
    window.handleBackgroundChange = function(val) {
      const backdrop = document.getElementById('cinema-backdrop');
      const overlay = document.getElementById('cinema-overlay');
      const canvaContainer = document.getElementById('canva-background-container');
      const canvaSettings = document.getElementById('canva-settings-group');
      const embedLinkInput = document.getElementById('canva-embed-link');
      const videoGroup = document.getElementById('video-selector-group');

      if (val === 'canva') {
        backdrop.style.display = 'none';
        if (overlay) overlay.style.display = 'none';
        canvaContainer.style.display = 'block';
        canvaSettings.style.display = 'block';
        if (videoGroup) videoGroup.style.display = 'none';
        updateCanvaEmbed(embedLinkInput.value);
      } else {
        canvaContainer.style.display = 'none';
        canvaSettings.style.display = 'none';
        backdrop.style.display = 'block';
        if (overlay) overlay.style.display = 'block';
        if (videoGroup) videoGroup.style.display = 'block';
        
        backdrop.src = val;
        backdrop.load();
        backdrop.play().catch(err => {
          console.warn("Autoplay failed after video change:", err);
        });
      }
    };

    // Update Canva embed source
    window.updateCanvaEmbed = function(url) {
      const container = document.getElementById('canva-background-container');
      const orientationSelector = document.getElementById('orientation-selector');
      const currentOrientation = orientationSelector ? orientationSelector.value : 'landscape';
      const presetSelector = document.getElementById('preset-selector');
      const currentPreset = presetSelector ? presetSelector.value : 'blank';

      const isDefaultOrEmpty = !url || !url.trim() || 
        url.trim() === 'https://www.canva.com/design/DAGFc2-0P8A/view?embed' ||
        url.trim() === 'https://www.canva.com/design/DAGFc2-0P8A/view';

      if (isDefaultOrEmpty) {
        if (currentPreset === 'custom_canva') {
          container.style.backgroundImage = 'none';
          container.innerHTML = `
            <div class="canva-instructions-card">
              <h2>🎨 DESIGN YOUR OWN SCREEN WITH CANVA</h2>
              <ol>
                <li>Open your custom design or layout inside <strong>Canva.com</strong></li>
                <li>Click <strong>"Share"</strong> in the top-right corner, scroll down and select <strong>"More"</strong></li>
                <li>Click <strong>"Embed"</strong> and copy the second URL option <strong>("Smart Embed Link")</strong></li>
                <li>Paste your private link into the <strong>SignageHub Manager</strong> input box to sync live!</li>
               </ol>
            </div>
          `;
        } else {
          let previewUrl = '';
          if (currentPreset === 'morning_paper') {
            previewUrl = currentOrientation === 'portrait'
              ? 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779607200/the_morning_paper_portr%C3%A6t_fzp91w.png'
              : 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779607199/the_morning_paper_fuqq3z.png';
          } else {
            previewUrl = currentOrientation === 'portrait' 
              ? 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779594844/The_Editorial_Bistro_Menu_for_signagehub_portr%C3%A6t_iu1vjb.png'
              : 'https://res.cloudinary.com/dzlfn7vap/image/upload/v1779594846/The_Editorial_Bistro_Menu_for_signagehub_pokoii.png';
          }
          
          container.style.backgroundImage = `url('${previewUrl}')`;
          container.style.backgroundSize = 'cover';
          container.style.backgroundPosition = 'center';
          container.innerHTML = '';
        }
      } else {
        let finalUrl = url.trim();
        if (finalUrl.includes('canva.com/design/') && !finalUrl.includes('embed')) {
          if (finalUrl.includes('?')) {
            finalUrl += '&embed';
          } else {
            finalUrl += '?embed';
          }
        }
        container.style.backgroundImage = 'none';
        container.innerHTML = `<iframe src="${finalUrl}" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>`;
      }
    };

    // Screen orientation toggle handler
    window.toggleOrientation = function(orientation) {
      const body = document.body;
      const videoSelector = document.getElementById('video-selector');
      const selectedVideoVal = videoSelector.value;
      const presetSelector = document.getElementById('preset-selector');
      const canvaEditBtn = document.getElementById('canva-edit-btn');

      const isCanvaActive = (presetSelector.value === 'restaurant' || presetSelector.value === 'custom_canva' || presetSelector.value === 'morning_paper');

      if (orientation === 'portrait') {
        body.classList.add('portrait-mode');
        if (canvaEditBtn) {
          if (presetSelector.value === 'morning_paper') {
            canvaEditBtn.href = 'https://canva.link/tf4mm0t58wdjznf';
          } else {
            canvaEditBtn.href = 'https://canva.link/gk8q8x3iykc1oca';
          }
        }
        // Filter options for Portrait
        videoSelector.innerHTML = `
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4">Luxury Hotel Lounge (Portrait)</option>
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4">Fine Dining Restaurant (Portrait)</option>
        `;
        if (selectedVideoVal !== 'canva') {
          videoSelector.value = selectedVideoVal;
        }
        
        // If restaurant preset is active, clear Canva link
        if (presetSelector.value === 'restaurant') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          embedLinkInput.value = '';
          updateCanvaEmbed('');
        }

        // If currently in Canva backdrop mode, force refresh preview/iframe
        if (isCanvaActive) {
          const embedLinkInput = document.getElementById('canva-embed-link');
          updateCanvaEmbed(embedLinkInput.value);
        }

        // Portrait activates portrait layout configurations: adjust slot scales for vertical fit
        for (let i = 1; i <= 9; i++) {
          const config = slotConfigurations[i];
          if (config.plugin !== 'none') {
            config.scale = Math.min(config.scale, 0.45);
            updateSlotInstance(i);
          }
        }
        buildAdminControls();
      } else {
        body.classList.remove('portrait-mode');
        if (canvaEditBtn) {
          if (presetSelector.value === 'morning_paper') {
            canvaEditBtn.href = 'https://canva.link/pz3aba64hnqyymv';
          } else {
            canvaEditBtn.href = 'https://canva.link/qtdk4f6jz096vtm';
          }
        }
        // Filter options for Landscape
        videoSelector.innerHTML = `
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1779522502/bgvideo_gtbxuf.mp4">Luxury Hotel Lounge</option>
          <option value="https://res.cloudinary.com/dzlfn7vap/video/upload/v1776355567/screen_show_kzlsbm.mp4">Fine Dining Restaurant</option>
        `;
        if (selectedVideoVal !== 'canva') {
          videoSelector.value = selectedVideoVal;
        }
        
        // If restaurant preset is active, pre-populate Canva link
        if (presetSelector.value === 'restaurant') {
          const embedLinkInput = document.getElementById('canva-embed-link');
          embedLinkInput.value = 'https://www.canva.com/design/DAGFc2-0P8A/view?embed';
          updateCanvaEmbed(embedLinkInput.value);
        }

        // If currently in Canva backdrop mode, force refresh preview/iframe
        if (isCanvaActive) {
          const embedLinkInput = document.getElementById('canva-embed-link');
          updateCanvaEmbed(embedLinkInput.value);
        }

        for (let i = 1; i <= 9; i++) {
          const config = slotConfigurations[i];
          if (config.plugin !== 'none') {
            config.scale = 0.5;
            updateSlotInstance(i);
          }
        }
        buildAdminControls();
      }
    };

    // Show/Hide Panel Drawer Logic
    function setupDrawerToggler() {
      const btn = document.getElementById('btn-toggle-controls');
      const panel = document.getElementById('master-control-panel');

      btn.addEventListener('click', () => {
        const isHidden = panel.classList.toggle('drawer-hidden');
        if (isHidden) {
          btn.classList.add('controls-closed');
          btn.querySelector('.btn-text').textContent = 'SHOW MASTER PANEL';
        } else {
          btn.classList.remove('controls-closed');
          btn.querySelector('.btn-text').textContent = 'HIDE MASTER PANEL';
        }
      });
    }

    // Cinematic Background Environment Selector Listener
    function setupVideoSelector() {
      const selector = document.getElementById('video-selector');
      selector.addEventListener('change', () => {
        handleBackgroundChange(selector.value);
      });
    }
  </script>
</body>
</html>
